<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox AI - مساعدك الذكي</title>
    <!-- استيراد خط تجوال العربي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
 
    <style>
        /* =========================================
           1. الأساسيات والمتغيرات (CSS Variables & Reset)
           ========================================= */
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-color: #ffffff;
            --text-secondary: #94a3b8;
            --user-msg-bg: rgba(99, 102, 241, 0.2);
            --ai-msg-bg: rgba(255, 255, 255, 0.05);
            --radius-lg: 16px;
            --radius-md: 12px;
            --font-family: 'Tajawal', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* خلفية زخرفية (Decoration blobs) */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
        }
        .blob-1 { width: 300px; height: 300px; background: #6366f1; top: -50px; left: -50px; }
        .blob-2 { width: 400px; height: 400px; background: #ec4899; bottom: -100px; right: -100px; }

        /* =========================================
           2. التخطيط العام (Layout)
           ========================================= */
        #app-container {
            display: flex;
            width: 95%;
            height: 90vh;
            max-width: 1400px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
            overflow: hidden;
            position: relative;
        }

        /* =========================================
           3. القائمة الجانبية (Sidebar)
           ========================================= */
        #sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.2);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }

        #sidebar.closed {
            transform: translateX(100%);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .new-chat-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: var(--radius-md);
            cursor: pointer;
            width: 100%;
            font-family: var(--font-family);
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover { background: var(--primary-hover); }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .history-item:hover, .history-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .user-profile {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        /* =========================================
           4. منطقة الشات (Chat Area)
           ========================================= */
        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
        }

        /* Header */
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .toggle-sidebar-btn {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
        }

        /* Messages Area */
        #messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: var(--radius-md);
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-start;
            background: var(--user-msg-bg);
            border-bottom-right-radius: 2px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .message.ai {
            align-self: flex-end;
            background: var(--ai-msg-bg);
            border-bottom-left-radius: 2px;
            border: 1px solid var(--glass-border);
        }

        /* أدوات الرسالة (TTS) */
        .msg-tools {
            margin-top: 8px;
            display: flex;
            justify-content: flex-end;
            opacity: 0.7;
        }
        .tts-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tts-btn:hover { color: white; opacity: 1; }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        #user-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 15px 45px 15px 15px;
            border-radius: 25px;
            color: white;
            font-family: var(--font-family);
            resize: none;
            height: 50px;
            max-height: 120px;
            transition: 0.3s;
        }

        #user-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
        }

        .send-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { background: #4b5563; cursor: not-allowed; }

        /* Voice Button */
        .mic-btn {
            position: absolute;
            left: 10px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        /* Voice Visual Feedback (Pulse) */
        .mic-btn.listening {
            color: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #sidebar { width: 85%; transform: translateX(100%); box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
            #sidebar.open { transform: translateX(0); }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- خلفية جمالية -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div id="app-container">
        <!-- القائمة الجانبية -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Velox AI</h2>
                <!-- زر إغلاق القائمة في الموبايل -->
                <button class="toggle-sidebar-btn" onclick="App.UI.toggleSidebar()">✕</button>
            </div>
            <div style="padding: 10px 20px;">
                <button class="new-chat-btn" onclick="App.Logic.newChat()">
                    <span>+</span> محادثة جديدة
                </button>
            </div>
            <div class="history-list" id="history-list">
                <!-- سيتم ملؤها بواسطة JS -->
            </div>
            <div class="user-profile">
                <div class="avatar" id="user-avatar">G</div>
                <div>
                    <div style="font-size: 0.9rem; font-weight: bold;">ضيف</div>
                    <div style="font-size: 0.8rem; color: var(--text-secondary);" id="guest-id-display">ID: ...</div>
                </div>
            </div>
        </aside>

        <!-- واجهة الشات الرئيسية -->
        <main id="main-chat">
            <header class="chat-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="toggle-sidebar-btn" onclick="App.UI.toggleSidebar()">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h3 id="current-session-title">Velox AI</h3>
                </div>
            </header>

            <div id="messages-container">
                <!-- الرسائل ستظهر هنا -->
                <div class="message ai">
                    مرحباً! أنا Velox AI، مساعدك الذكي. كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="اكتب رسالتك هنا..." autocomplete="off">
                    <button id="mic-btn" class="mic-btn" title="تسجيل صوتي">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    </button>
                </div>
                <button id="send-btn" class="send-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </main>
    </div>

    <script>
        /**
         * =========================================
         * Velox AI - Modular JavaScript Architecture
         * =========================================
         * يحتوي هذا الملف على جميع الوظائف مقسمة إلى وحدات منطقية.
         */

        // --- مكان وضع مفتاح API الخاص بك ---
       const CONFIG = {
    // هنا غتحط المفتاح ديالك، ولكن بشرط (شوف تحت)
    
    
    // الحل باش يتحيد الخطأ: غنستعملو Proxy بسيط
    // كنصحك تستعمل هذا الرابط كوسيط باش المتصفح يقدر يهضر مع OpenAI
    API_URL: "https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.openai.com/v1/chat/completions"),
    
    MODEL: "gpt-3.5-turbo",
    SYSTEM_PROMPT: "أنت مساعد ذكي ومحترف اسمه Velox AI..."
};
        // --- وحدة التخزين والهوية (Storage & Identity Module) ---
        const Storage = {
            // توليد أو استرجاع معرف الضيف
            getGuestId: () => {
                let guestId = localStorage.getItem('velox_guest_id');
                if (!guestId) {
                    guestId = 'guest_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('velox_guest_id', guestId);
                }
                return guestId;
            },

            // توليد لون عشوائي للـ Avatar
            getAvatarColor: (id) => {
                const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899'];
                let hash = 0;
                for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
                return colors[Math.abs(hash) % colors.length];
            },

            // حفظ واسترجاع المحادثات
            saveChat: (guestId, sessionId, title, messages) => {
                let allChats = JSON.parse(localStorage.getItem('velox_chats') || '{}');
                if (!allChats[guestId]) allChats[guestId] = [];
                
                const existingIndex = allChats[guestId].findIndex(c => c.sessionId === sessionId);
                const chatData = { sessionId, title, messages, timestamp: Date.now() };

                if (existingIndex > -1) {
                    allChats[guestId][existingIndex] = chatData;
                } else {
                    allChats[guestId].unshift(chatData); // إضافة للأعلى
                }
                
                localStorage.setItem('velox_chats', JSON.stringify(allChats));
            },

            getChats: (guestId) => {
                let allChats = JSON.parse(localStorage.getItem('velox_chats') || '{}');
                return allChats[guestId] || [];
            }
        };

        // --- وحدة الذكاء الاصطناعي (AI Module) ---
        const AI = {
            sendMessage: async (messages, onLoading, onSuccess, onError) => {
                onLoading(true);

                try {
                    // التحقق من وجود المفتاح
                    if (CONFIG.API_KEY === "YOUR_OPENAI_API_KEY_HERE" || !CONFIG.API_KEY) {
                        throw new Error("يرجى وضع مفتاح OpenAI API الخاص بك في كود الجافاسكربت (const CONFIG).");
                    }

                    const response = await fetch(CONFIG.API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${CONFIG.API_KEY}`
                        },
                        body: JSON.stringify({
                            model: CONFIG.MODEL,
                            messages: [
                                { role: "system", content: CONFIG.SYSTEM_PROMPT },
                                ...messages
                            ]
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || 'فشل الاتصال بالخادم');
                    }

                    const data = await response.json();
                    const aiText = data.choices[0].message.content;
                    onSuccess(aiText);

                }
                catch (error) {
                    onError(error.message);
                } finally {
                    onLoading(false);
                }
            }
        };

        // --- وحدة الصوتيات (Voice Module) ---
        const Voice = {
            recognition: null,
            isListening: false,
            
            init: (onResult) => {
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    Voice.recognition = new SpeechRecognition();
                    Voice.recognition.lang = 'ar-SA'; // اللغة العربية
                    Voice.recognition.continuous = false;
                    Voice.recognition.interimResults = false;

                    Voice.recognition.onstart = () => {
                        Voice.isListening = true;
                        App.UI.updateMicState(true);
                    };

                    Voice.recognition.onend = () => {
                        Voice.isListening = false;
                        App.UI.updateMicState(false);
                    };

                    Voice.recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        onResult(transcript);
                    };
                } else {
                    console.warn("متصفحك لا يدعم خاصية تحويل الصوت لنص.");
                    document.getElementById('mic-btn').style.display = 'none';
                }
            },

            toggle: () => {
                if (!Voice.recognition) return;
                if (Voice.isListening) Voice.recognition.stop();
                else Voice.recognition.start();
            },

            speak: (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); // إيقاف أي قراءة سابقة
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'ar-SA';
                    utterance.rate = 1;
                    window.speechSynthesis.speak(utterance);
                }
            }
        };

        // --- وحدة المنطق والتطبيق الرئيسي (Main App Logic) ---
        const App = {
            state: {
                guestId: null,
                sessionId: null,
                messages: [], // مصفوفة الرسائل الحالية للجلسة
                isLoading: false
            },

            init: () => {
                // 1. إعداد الهوية
                App.state.guestId = Storage.getGuestId();
                const avatarColor = Storage.getAvatarColor(App.state.guestId);
                
                // تحديث الواجهة بالهوية
                document.getElementById('guest-id-display').innerText = `ID: ${App.state.guestId.substr(-6)}`;
                const avatarEl = document.getElementById('user-avatar');
                avatarEl.style.backgroundColor = avatarColor;
                avatarEl.innerText = App.state.guestId.charAt(5).toUpperCase(); // حرف عشوائي

                // 2. بدء جلسة جديدة
                App.Logic.newChat();

                // 3. تهيئة الأحداث (Event Listeners)
                App.UI.bindEvents();

                // 4. تهيئة الصوتيات
                Voice.init((text) => {
                    document.getElementById('user-input').value = text;
                    App.Logic.handleSend();
                });

                // 5. تحميل القائمة الجانبية
                App.UI.renderHistory();
            },

            Logic: {
                newChat: () => {
                    // حفظ الجلسة الحالية إذا كانت تحتوي على رسائل
                    if (App.state.messages.length > 0) {
                        const title = App.state.messages[0].content.substring(0, 30) + '...';
                        Storage.saveChat(App.state.guestId, App.state.sessionId, title, App.state.messages);
                    }

                    // بدء جلسة جديدة
                    App.state.sessionId = 'session_' + Date.now();
                    App.state.messages = [];
                    App.UI.clearChat();
                    App.UI.renderHistory();
                    
                    // ترحيب افتراضي
                    App.UI.addMessage("مرحباً بك مجدداً! أنا Velox AI.", 'ai');
                },

                loadChat: (sessionId) => {
                    const chats = Storage.getChats(App.state.guestId);
                    const chat = chats.find(c => c.sessionId === sessionId);
                    if (chat) {
                        App.state.sessionId = chat.sessionId;
                        App.state.messages = chat.messages;
                        App.UI.clearChat();
                        chat.messages.forEach(msg => {
                            App.UI.addMessageToDOM(msg.content, msg.role, false); // false = don't save again
                        });
                        // إغلاق السايدبار في الموبايل بعد الاختيار
                        if (window.innerWidth <= 768) {
                            document.getElementById('sidebar').classList.remove('open');
                        }
                    }
                },

                handleSend: async () => {
                    const input = document.getElementById('user-input');
                    const text = input.value.trim();

                    if (!text || App.state.isLoading) return;

                    // 1. إضافة رسالة المستخدم
                    App.UI.addMessage(text, 'user');
                    input.value = '';

                    // 2. الاتصال بـ API
                    await AI.sendMessage(
                        App.state.messages,
                        (loading) => App.UI.setLoading(loading), // onLoading
                        (aiText) => { // onSuccess
                            App.UI.addMessage(aiText, 'ai');
                            // حفظ تلقائي
                            const title = App.state.messages[0].content.substring(0, 30) + '...';
                            Storage.saveChat(App.state.guestId, App.state.sessionId, title, App.state.messages);
                            App.UI.renderHistory(); // تحديث العناوين
                        },
                        (errorMsg) => { // onError
                            App.UI.addMessage(`⚠️ خطأ: ${errorMsg}`, 'ai');
                        }
                    );
                }
            },

            UI: {
                toggleSidebar: () => {
                    const sidebar = document.getElementById('sidebar');
                    if (window.innerWidth <= 768) {
                        sidebar.classList.toggle('open');
                    } else {
                        sidebar.classList.toggle('closed');
                    }
                },

                updateMicState: (isListening) => {
                    const btn = document.getElementById('mic-btn');
                    if (isListening) btn.classList.add('listening');
                    else btn.classList.remove('listening');
                },

                addMessage: (text, role) => {
                    // إضافة للحالة المحلية
                    App.state.messages.push({ role: role, content: text });
                    // عرض في الواجهة
                    App.UI.addMessageToDOM(text, role, true);
                },

                addMessageToDOM: (text, role, scroll = true) => {
                    const container = document.getElementById('messages-container');
                    const div = document.createElement('div');
                    div.className = `message ${role}`;
                    div.innerText = text;

                    // زر القراءة الصوتية للردود فقط
                    if (role === 'ai') {
                        const tools = document.createElement('div');
                        tools.className = 'msg-tools';
                        const ttsBtn = document.createElement('button');
                        ttsBtn.className = 'tts-btn';
                        ttsBtn.innerHTML = '🔊 استماع';
                        ttsBtn.onclick = () => Voice.speak(text);
                        tools.appendChild(ttsBtn);
                        div.appendChild(tools);
                    }

                    container.appendChild(div);
                    if (scroll) container.scrollTop = container.scrollHeight;
                },

                clearChat: () => {
                    document.getElementById('messages-container').innerHTML = '';
                },

                setLoading: (isLoading) => {
                    App.state.isLoading = isLoading;
                    const sendBtn = document.getElementById('send-btn');
                    if (isLoading) {
                        const originalContent = sendBtn.innerHTML;
                        sendBtn.innerHTML = '<div class="spinner"></div>';
                        sendBtn.dataset.original = originalContent;
                        sendBtn.disabled = true;
                    } else {
                        sendBtn.innerHTML = sendBtn.dataset.original || '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>';
                        sendBtn.disabled = false;
                    }
                },

                renderHistory: () => {
                    const list = document.getElementById('history-list');
                    const chats = Storage.getChats(App.state.guestId);
                    list.innerHTML = '';

                    chats.forEach(chat => {
                        const item = document.createElement('div');
                        item.className = `history-item ${chat.sessionId === App.state.sessionId ? 'active' : ''}`;
                        item.innerText = chat.title || 'محادثة جديدة';
                        item.onclick = () => App.Logic.loadChat(chat.sessionId);
                        list.appendChild(item);
                    });
                },

                bindEvents: () => {
                    const sendBtn = document.getElementById('send-btn');
                    const micBtn = document.getElementById('mic-btn');
                    const input = document.getElementById('user-input');

                    // إرسال عند الضغط على الزر
                    sendBtn.addEventListener('click', App.Logic.handleSend);

                    // تفعيل الميكروفون
                    micBtn.addEventListener('click', Voice.toggle);

                    // إرسال عند الضغط على Enter (دون Shift)
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault(); // منع سطر جديد
                            App.Logic.handleSend();
                        }
                    });
                }
            }
        };

        // تشغيل التطبيق عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', App.init);

    </script>
</body>
</html>
