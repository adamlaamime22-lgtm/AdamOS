<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AdamOS - Final</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0d0d0d; color: #fff; font-family: sans-serif; overflow: hidden; transition: 0.3s; }
        
        /* شاشة الدخول */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0d0d0d; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:1000; }
        
        /* التوزيع: الـ Main في اليسار والـ Sidebar في اليمين */
        .main-area { flex: 1; display: flex; flex-direction: column; padding: 40px; position: relative; }
        .sidebar { width: 320px; background: #111; border-left: 1px solid #333; display: flex; flex-direction: column; padding: 20px; }
        
        /* عناصر الـ Sidebar */
        .title { color: #00ff9d; font-size: 1.4em; font-weight: bold; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .toggle-btn { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; background: linear-gradient(to right, #000 50%, #fff 50%); border: 2px solid #00ff9d; }
        .new-chat { border: 1px solid #00ff9d; color: #00ff9d; padding: 10px; border-radius: 5px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        
        /* عناصر الـ Main */
        .logo-box { background: #00ff9d; color: #000; padding: 15px 25px; border-radius: 10px; width: fit-content; font-weight: bold; }
        .bottom-input { position: absolute; bottom: 40px; width: 85%; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; display: flex; align-items: center; }
        input { flex: 1; background: none; border: none; color: white; padding: 10px; outline: none; text-align: right; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <input type="text" id="nameInput" placeholder="ادخل اسمك..." style="padding:15px; border-radius:10px; border:none; width:250px; text-align:center;">
    <button onclick="saveName()" style="margin-top:15px; padding:10px 20px; cursor:pointer; background:#00ff9d; border:none; border-radius:5px; font-weight:bold;">دخول</button>
</div>

<div class="main-area">
    <div class="logo-box" id="logoText">AdamOS</div>
    <div class="bottom-input">
        <div style="background:#00ff9d; padding:10px; border-radius:5px; cursor:pointer;">➔</div>
        <input type="text" placeholder="اسأل AdamOS...">
    </div>
</div>

<div class="sidebar">
    <div class="title">
        ADAMOS ◰ 
        <div class="toggle-btn" onclick="toggleTheme()"></div>
    </div>
    <div class="new-chat">+ محادثة جديدة</div>
    <div style="background:#1a1a1a; padding:15px; border-radius:5px; border:1px solid #333;">AdamOS</div>
</div>

<script>
    function saveName() {
        let name = document.getElementById('nameInput').value;
        if(name) {
            localStorage.setItem('userName', name);
            document.getElementById('logoText').innerText = name;
            document.getElementById('loginOverlay').style.display = 'none';
        }
    }
    
    function toggleTheme() { document.body.style.filter = document.body.style.filter ? '' : 'invert(1)'; }

    if(localStorage.getItem('userName')) {
        document.getElementById('logoText').innerText = localStorage.getItem('userName');
        document.getElementById('loginOverlay').style.display = 'none';
    }
</script>

</body>
</html>
