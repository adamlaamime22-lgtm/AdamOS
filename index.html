<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; 
            background: radial-gradient(circle at top right, #2e1b4e, #0d0d0d);
            color: white; font-family: sans-serif;
        }

        /* الـ Sidebar بستايل زجاجي */
        .sidebar { 
            width: 280px; background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); border-left: 1px solid rgba(255,255,255,0.1);
            padding: 20px; display: flex; flex-direction: column;
        }

        /* المنطقة الرئيسية */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* صندوق الإدخال الزجاجي */
        .input-box { 
            width: 600px; background: rgba(255, 255, 255, 0.1); 
            padding: 15px; border-radius: 20px; 
            backdrop-filter: blur(15px); display: flex; align-items: center;
        }
        
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        .mic { margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="main">
    <div class="input-box">
        <input type="text" placeholder="اكتب سؤالك...">
        <span class="mic">🎤</span>
    </div>
</div>

<div class="sidebar">
    <div style="font-weight:bold; margin-bottom: 20px;">VELOX AI</div>
    <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:10px;">+ محادثة جديدة</div>
    <div style="margin-top:20px; color:#aaa; font-size: 0.8em;">سجل المحادثات...</div>
</div>

</body>
</html>
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VELOX AI</title>
    <style>
        /* الستايل اللي قادينا (Glassmorphism) */
        body { margin: 0; height: 100vh; display: flex; background: #131314; color: white; font-family: sans-serif; }
        .sidebar { width: 280px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 20px; display: flex; flex-direction: column; gap: 20px; border-left: 1px solid rgba(255,255,255,0.1); }
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .input-box { width: 600px; background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 20px; backdrop-filter: blur(15px); display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        
        button { cursor: pointer; padding: 10px 15px; border-radius: 8px; border: none; background: #333; color: white; transition: 0.3s; }
        button:hover { background: #555; }
    </style>
</head>
<body>

<div class="sidebar">
    <button id="newChatBtn">+ محادثة جديدة</button>
    <div id="historyList" style="color: #aaa; font-size: 0.9em;">سجل المحادثات...</div>
</div>

<div class="main">
    <div class="input-box">
        <button id="micBtn">🎤</button>
        <input type="text" id="userInput" placeholder="اكتب سؤالك لـ VELOX...">
        <button id="sendBtn">إرسال</button>
    </div>
</div>

<script>
    // ربط البوتونات بالوظائف (Logic)
    document.getElementById('newChatBtn').addEventListener('click', () => {
        alert("بدأنا محادثة جديدة!");
    });

    document.getElementById('sendBtn').addEventListener('click', () => {
        let input = document.getElementById('userInput').value;
        if(input.trim() !== "") {
            console.log("السؤال المرسل: " + input);
            alert("تم إرسال: " + input);
            document.getElementById('userInput').value = ""; // مسح الخانة بعد الإرسال
        }
    });

    document.getElementById('micBtn').addEventListener('click', () => {
        alert("الميكروفون قيد التشغيل...");
    });
</script>

</body>
</html>
