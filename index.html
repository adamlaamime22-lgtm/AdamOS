<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VELOX AI</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; background: #131314; color: white; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 280px; background: rgba(255, 255, 255, 0.03); padding: 20px; border-left: 1px solid rgba(255,255,255,0.05); }
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .input-area { padding: 20px; background: #222; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; outline: none; }
        button { padding: 10px 20px; background: #4a90e2; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <aside class="sidebar"><h2>VELOX AI</h2></aside>
    <main class="main">
        <div id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="اسأل VELOX...">
            <button id="sendBtn">إرسال</button>
        </div>
    </main>
    <script>
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if(!input.value) return;
            chatBox.innerHTML += `<div style="align-self: flex-end; background: #2b2b2b; padding: 10px; border-radius: 10px;">أنت: ${input.value}</div>`;
            input.value = "";
        });
    </script>
</body>
</html>
