<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox AI | OMEGA FINAL</title>
    <style>
        /* VELOX UI SYSTEM - PURE CSS */
        :root {
            --bg: #000;
            --surface: #111;
            --primary: #00ff9d;
            --text: #eee;
            --dim: #666;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace; /* Tech feel */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        #app {
            width: 90vw;
            height: 85vh;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            box-shadow: 0 0 50px rgba(0,255,157,0.1);
        }
        header {
            padding: 15px;
            border-bottom: 1px solid #333;
            color: var(--primary);
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        #chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 14px;
        }
        .msg { margin-bottom: 15px; line-height: 1.5; }
        .msg.user { color: #fff; text-align: right; }
        .msg.ai { color: var(--primary); }
        input {
            width: 100%;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            font-family: inherit;
            border-top: 1px solid #333;
        }
        input:focus { outline: 1px solid var(--primary); }
    </style>
</head>
<body>

<div id="app">
    <header>
        <span>VELOX_AI [OMEGA_FINAL]</span>
        <span style="color: #666">EXT_INTERFERENCE_DETECTED (IGNORE)</span>
    </header>
    
    <div id="chat">
        <div class="msg ai">> System Ready. External AdBlock noise detected in Console. System functionality: Unaffected.</div>
    </div>

    <input type="text" id="inp" placeholder="> Enter command..." onkeypress="if(event.key==='Enter') send()">
</div>

<script>
    // SIMPLE ROBUST ENGINE
    function send() {
        const inp = document.getElementById('inp');
        const chat = document.getElementById('chat');
        const txt = inp.value;
        if(!txt) return;

        // User msg
        const u = document.createElement('div');
        u.className = 'msg user';
        u.innerText = '> ' + txt;
        chat.appendChild(u);

        inp.value = '';

        // AI Response (Simulated)
        setTimeout(() => {
            const a = document.createElement('div');
            a.className = 'msg ai';
            a.innerText = 'Processed: ' + txt + '\nStatus: OK';
            chat.appendChild(a);
            chat.scrollTop = chat.scrollHeight;
        }, 500);
    }
</script>

</body>
</html>
