<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOX AI | ABSOLUTE CORE PROTOCOL</title>
    <style>
        /* 
         * VELOX AI - UI SYSTEM DESIGN
         * Theme: Dark Glassmorphism
         * Performance: Optimized for 60FPS
         */

        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: 16px;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #00ffcc;
            --accent-dim: rgba(0, 255, 204, 0.1);
            --error-color: #ff4444;
            --success-color: #00cc66;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Consolas', 'Monaco', monospace;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(20, 20, 30, 1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(10, 20, 40, 1) 0%, transparent 20%);
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* LAYOUT CONTAINER */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            backdrop-filter: blur(5px);
            position: relative;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .brand-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
            animation: pulse 2s infinite;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover {
            background: var(--glass-border);
            color: var(--text-primary);
        }

        .nav-btn.active {
            background: var(--accent-dim);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .system-status-panel {
            margin-top: auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--success-color);
            font-weight: bold;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--success-color);
            border-radius: 50%;
        }

        /* MAIN CHAT AREA */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            height: 70px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            background: rgba(5, 5, 5, 0.4);
            backdrop-filter: blur(10px);
        }

        .session-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .session-id {
            font-family: var(--font-mono);
            color: var(--text-primary);
            margin-left: 5px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* SCROLLBAR CUSTOMIZATION */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 3px;
        }

        /* MESSAGES */
        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-bottom-right-radius: 2px;
        }

        .message.velox {
            align-self: flex-start;
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid rgba(0, 255, 204, 0.1);
            border-bottom-left-radius: 2px;
            color: #dcdcdc;
        }

        .message.velox strong {
            color: var(--accent-color);
        }

        .message.velox code {
            background: rgba(0,0,0,0.3);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.9em;
        }

        .message.velox pre {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 10px;
            border: 1px solid var(--glass-border);
        }

        .message.system {
            align-self: center;
            max-width: 100%;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border: 1px dashed var(--glass-border);
            background: transparent;
        }

        /* INPUT AREA */
        .input-area {
            padding: 20px 30px;
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 15px;
            transition: border-color 0.2s;
            display: flex;
            align-items: center;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 1rem;
            resize: none;
            height: 24px;
            max-height: 120px;
            padding: 0;
            line-height: 24px;
        }

        /* ACTION BUTTONS */
        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 10px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--glass-border);
            color: var(--text-primary);
        }

        .action-btn.send {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .action-btn.send:hover {
            background: #00e6b8;
            transform: scale(1.05);
        }

        .action-btn.mic.listening {
            background: var(--error-color);
            color: white;
            animation: pulse 1.5s infinite;
        }

        /* SPINNER */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 10px;
            display: none; /* Hidden by default */
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        /* ANIMATIONS */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 100;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left: 4px solid var(--error-color); }
        .toast.success { border-left: 4px solid var(--success-color); }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -100%;
                box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            }
            .sidebar.open { left: 0; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>

    <!-- App Container -->
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <div class="brand-dot"></div>
                VELOX AI
            </div>
            
            <nav class="nav-menu">
                <button class="nav-btn active" id="btn-new-chat" onclick="veloxApp.startNewChat()">
                    <span>+</span> New Chat
                </button>
                <button class="nav-btn" id="btn-settings" onclick="veloxApp.triggerAction('Settings')">

                </button>
                <button class="nav-btn" id="btn-export" onclick="veloxApp.exportData()">
                    <span>⬇</span> Export Data
                </button>

            <div class="system-status-panel">
                <div class="status-row">
                    <span>Status</span>
                    <span class="status-indicator"><div class="status-dot"></div> Connected</span>
                </div>
                <div class="status-row">
                    <span>Protocol</span>

                </div>

                    <span>Latency</span>
                    <span id="latency-val">12ms</span>
                </div>

        </aside>

        <!-- Main Chat Interface -->
        <main class="main-area">
            <header class="chat-header">
                <div class="session-info">
                    GUEST ID: <span class="session-id" id="guest-id-display">LOADING...</span>
                </div>
                <!-- Hidden Data Inputs -->
                <input type="hidden" id="hidden-input-trigger">
            </header>

            <div class="chat-container" id="chat-box">
                <!-- Initial System Message -->
                <div class="message system">
                    Core initialized. Privacy protocol active. Awaiting input.
                </div>
            </div>

            <!-- Typing Indicator -->
            <div style="padding: 0 30px;">
                <div class="typing-indicator" id="typing-indicator">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <!-- Input Section -->
            <div class="input-area">
                <button class="action-btn mic" id="mic-btn" title="Voice Input">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Enter command or query..." rows="1"></textarea>

                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Toast Notification Element -->
    <div id="toast" class="toast">
        <span id="toast-message">Notification</span>
    </div>

    <script>
        /**
         * VELOX AI - ABSOLUTE CORE PROTOCOL v2.0
         * 
         * 1. DATABASE LAYER (IndexedDB)
         * 2. LOGIC CORE (Semantic Analysis & NLP Simulation)
         * 3. UI CONTROLLER (DOM Manipulation & Event Listeners)
         * 4. AUDIO INTERFACE (Web Speech API)
         */

        // --- 1. DATABASE LAYER ---
        class DatabaseManager {
            constructor(dbName, storeName) {
                this.dbName = dbName;
                this.storeName = storeName;
                this.db = null;
            }

            async connect() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, 1);

                    request.onupgradeneeded = (event) => {
                        this.db = event.target.result;
                        if (!this.db.objectStoreNames.contains(this.storeName)) {
                            this.db.createObjectStore(this.storeName, { keyPath: 'id', autoIncrement: true });
                        }
                    };

                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        resolve(this.db);
                    };

                    request.onerror = (event) => {
                        console.error('[DB] Connection failed:', event.target.error);
                        reject('Database connection failed');
                    };
                });
            }

            async addMessage(role, content, timestamp) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const entry = { role, content, timestamp };
                    const request = store.add(entry);

                    request.onsuccess = () => resolve(entry);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAllMessages() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readonly');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.getAll();

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async clearMemory() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.clear();

                    request.onsuccess = () => resolve('Memory cleared');
                    request.onerror = () => reject(request.error);
                });
            }
        }

        // --- 2. LOGIC CORE (Advanced Logic & Security) ---
        class LogicCore {
            constructor() {
                this.technicalKeywords = [
                    'code', 'function', 'algorithm', 'data', 'api', 'system', 
                    'logic', 'protocol', 'security', 'network', 'database', 
                    'debug', 'syntax', 'variable', 'array', 'object', 'class',
                    'html', 'css', 'javascript', 'python', 'java', 'server',
                    'client', 'http', 'request', 'response', 'encrypt', 'decrypt'
                ];
                this.nonTechnicalKeywords = [
                    'love', 'feel', 'horoscope', 'astrology', 'dream', 'emotion',
                    'crush', 'sad', 'happy', 'lucky', 'star', 'sign', 'zodiac',
                    'mood', 'relationship', 'date'
                ];
            }

            sanitizeInput(input) {
                // Basic XSS prevention
                const div = document.createElement('div');
                div.textContent = input;
                return div.innerHTML;
            }

            analyzeIntent(input) {
                const lowerInput = input.toLowerCase();
                
                // Security & Privacy Filter
                if (this.nonTechnicalKeywords.some(word => lowerInput.includes(word))) {
                    return { type: 'REJECT', data: 'Non-technical content detected.' };
                }

                // Identity Check
                if (lowerInput.includes('who are you') || lowerInput.includes('your identity') || lowerInput.includes('who created you')) {
                    return { type: 'IDENTITY', data: null };
                }

                // Technical Analysis
                const techScore = this.technicalKeywords.filter(word => lowerInput.includes(word)).length;
                
                if (techScore > 0) {
                    return { type: 'TECHNICAL', data: input };
                }

                // Default/Generic
                return { type: 'GENERIC', data: input };
            }

            processResponse(intent) {
                try {
                    switch (intent.type) {
                        case 'REJECT':
                            return "هذا الطلب خارج نطاق صلاحيات النظام. Velox AI مكرس للتحليل التقني وهندسة البرمجيات فقط.";
                        
                        case 'IDENTITY':
                            return "أنا Velox AI، كيان برمجي متطور صُمم بواسطة آدم. هدفي هو تقديم حلول برمجية دقيقة وتحليل منطقي عميق. هويتي وتفاصيلي التقنية محمية ببروتوكولات صارمة.";

                        case 'TECHNICAL':
                            return this.generateTechnicalInsight(intent.data);

                        case 'GENERIC':
                            return "تم استلام المدخلات. يرجى توفير سياق تقني أو سؤال برمجي محدد لتمكين المحرك التحليلي من معالجة الطلب بكفاءة.";

                        default:
                            return "خطأ في التحليل المنطقي.";
                    }
                } catch (error) {
                    console.error('[LogicCore] Processing Error:', error);
                    return "حدث خطأ غير متوقع في معالجة الطلب.";
                }
            }

            generateTechnicalInsight(input) {
                // Simulation of Deep Parsing & Structuring
                const codeBlock = "```javascript\nfunction analyze(data) {\n  return data.optimize();\n}\n```";
                
                if (input.includes('security') || input.includes('encrypt')) {
                    return `**تحليل الأمان (Security Analysis):**\n\nالطلب يتطلب بروتوكولات تشفير. طبقة النقل يجب أن تستخدم TLS 1.3.\n\n1. **Input Validation**: ضروري لمنع الحقن.\n2. **Sanitization**: تم تفعيل الفلتر.\n\nمثال تطبيقي:\n${codeBlock}\n\nالاستنتاج: النظام محصن ضد الثغرات الشائعة في هذا السياق.`;
                }
                
                if (input.includes('api') || input.includes('backend')) {
                    return `**هندسة الواجهة الخلفية (Backend Architecture):**\n\nلتحقيق أقصى أداء، يُفضل استخدام بنية Microservices.\n\n- **Protocol**: REST/GraphQL.\n- **Latency**: يجب الحفاظ عليها أقل من 50ms.\n\nكود الاتصال:\n${codeBlock}\n\nالمنطق: الفصل بين الطبقات يضمن قابلية التوسع.`;
                }

                // Default Technical Response
                return `**التحليل الهيكلي (Structural Analysis):**\n\nتم تفكيك النص المدخل: "${input}"\n\n- الكلمات المفتاحية تم استخراجها.\n- النمط المنطقي يتطلب معالجة تسلسلية.\n\nالاستنتاج: الطلب صالح للتنفيذ في بيئة التطوير.`;
            }
        }

        // --- 3. AUDIO INTERFACE ---
        class AudioController {
            constructor(onResult) {
                this.onResult = onResult;
                this.recognition = null;
                this.isListening = false;
                this.init();
            }

            init() {
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    this.recognition = new SpeechRecognition();
                    this.recognition.continuous = false;
                    this.recognition.lang = 'en-US'; // Default to English for commands, can be switched
                    this.recognition.interimResults = false;

                    this.recognition.onstart = () => {
                        this.isListening = true;
                        document.getElementById('mic-btn').classList.add('listening');
                        veloxApp.ui.showToast('Listening...', 'success');
                    };

                    this.recognition.onend = () => {
                        this.isListening = false;
                        document.getElementById('mic-btn').classList.remove('listening');
                    };

                    this.recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        this.onResult(transcript);
                    };

                    this.recognition.onerror = (event) => {
                        console.error('[Audio] Error:', event.error);
                        this.isListening = false;
                        document.getElementById('mic-btn').classList.remove('listening');
                        veloxApp.ui.showToast('Audio recognition failed', 'error');
                    };
                } else {
                    console.warn('[Audio] Web Speech API not supported');
                }
            }

            toggle() {
                if (!this.recognition) {
                    veloxApp.ui.showToast('Audio API not supported in this browser', 'error');
                    return;
                }
                if (this.isListening) {
                    this.recognition.stop();
                } else {
                    this.recognition.start();
                }
            }
        }

        // --- 4. MAIN APP CONTROLLER ---
        class VeloxApp {
            constructor() {
                this.dbManager = new DatabaseManager('VeloxDB', 'chats');
                this.logic = new LogicCore();
                this.audio = null;
                this.guestId = this.generateGuestId();
                this.ui = {
                    chatBox: document.getElementById('chat-box'),
                    input: document.getElementById('user-input'),
                    sendBtn: document.getElementById('send-btn'),
                    micBtn: document.getElementById('mic-btn'),
                    typing: document.getElementById('typing-indicator'),
                    guestIdDisplay: document.getElementById('guest-id-display')
                };
                
                this.init();
            }

            async init() {
                try {
                    await this.dbManager.connect();
                    this.ui.guestIdDisplay.textContent = this.guestId;
                    
                    // Initialize Audio
                    this.audio = new AudioController((text) => {
                        this.ui.input.value = text;
                        this.handleSend();
                    });

                    // Event Listeners
                    this.ui.sendBtn.addEventListener('click', () => this.handleSend());
                    this.ui.micBtn.addEventListener('click', () => this.audio.toggle());
                    
                    this.ui.input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            this.handleSend();
                        }
                    });

                    // Load history
                    this.loadHistory();

                    // System Status Update Simulation
                    setInterval(() => {
                        const latency = Math.floor(Math.random() * 20) + 5;
                        document.getElementById('latency-val').textContent = latency + 'ms';
                    }, 2000);

                } catch (error) {
                    this.showToast('System Initialization Failed', 'error');
                    console.error('[System] Init Error:', error);
                }
            }

            generateGuestId() {
                return 'GUEST-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            }

            async handleSend() {
                const rawText = this.ui.input.value.trim();
                if (!rawText) return;

                const sanitizedText = this.logic.sanitizeInput(rawText);
                this.ui.input.value = '';
                this.adjustTextareaHeight(this.ui.input);

                // Display User Message
                this.addMessageToUI('user', sanitizedText);
                
                // Save to DB
                await this.dbManager.addMessage('user', sanitizedText, Date.now());

                // Show Spinner
                this.ui.typing.style.display = 'flex';
                this.ui.chatBox.scrollTop = this.ui.chatBox.scrollHeight;

                // Simulate Processing Delay (Artificial Intelligence Latency)
                setTimeout(async () => {
                    this.ui.typing.style.display = 'none';
                    
                    const intent = this.logic.analyzeIntent(sanitizedText);
                    const response = this.logic.processResponse(intent);
                    
                    // Display Bot Message
                    this.addMessageToUI('velox', response);
                    await this.dbManager.addMessage('velox', response, Date.now());

                }, 600 + Math.random() * 800); // 0.6s - 1.4s delay
            }

            addMessageToUI(role, text) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${role}`;
                
                // Simple Markdown Parser
                let formattedText = this.parseMarkdown(text);
                msgDiv.innerHTML = formattedText;

                this.ui.chatBox.appendChild(msgDiv);
                this.ui.chatBox.scrollTop = this.ui.chatBox.scrollHeight;
            }

            parseMarkdown(text) {
                // Bold
                text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                // Code Blocks
                text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
                // Inline Code
                text = text.replace(/`(.*?)`/g, '<code>$1</code>');
                // Line breaks
                text = text.replace(/\n/g, '<br>');
                return text;
            }

            adjustTextareaHeight(el) {
                el.style.height = 'auto';
                el.style.height = (el.scrollHeight) + 'px';
                if(el.value === '') el.style.height = '24px';
            }

            async loadHistory() {
                const history = await this.dbManager.getAllMessages();
                if (history.length === 0) return;
                
                history.forEach(item => {
                    this.addMessageToUI(item.role, item.content);
                });
            }

            startNewChat() {
                this.dbManager.clearMemory().then(() => {
                    this.ui.chatBox.innerHTML = '<div class="message system">Session reset. New context initialized.</div>';
                    this.guestId = this.generateGuestId();
                    this.ui.guestIdDisplay.textContent = this.guestId;
                }).catch(err => {
                    this.showToast('Memory Clear Failed', 'error');
                });
            }

            async exportData() {
                const data = await this.dbManager.getAllMessages();
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "velox_session_data.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            }

            triggerAction(action) {
                this.showToast(`${action} module is currently offline for maintenance.`, 'error');
            }

            showToast(msg, type = 'success') {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toast-message');
                
                toast.className = `toast ${type} show`;
                toastMsg.textContent = msg;

                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
        }

        // Initialize Application
        const veloxApp = new VeloxApp();

        // Handle textarea auto-resize
        const tx = document.getElementById('user-input');
        tx.setAttribute('style', 'height:' + (tx.scrollHeight) + 'px;overflow-y:hidden;');
        tx.addEventListener("input", OnInput, false);

        function OnInput() {
            veloxApp.adjustTextareaHeight(this);
        }

    </script>
</body>
</html>
