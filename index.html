<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VELOX AI</title>
    <style>
        body { margin: 0; height: 100vh; background: #0b0c0f; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h1 { font-weight: 300; margin-bottom: 30px; }
        .input-container { width: 600px; background: #1e1f20; padding: 15px 20px; border-radius: 50px; display: flex; align-items: center; gap: 15px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        .icon { cursor: pointer; color: #aaa; }
        .model-selector { cursor: pointer; display: flex; align-items: center; gap: 5px; color: #4a90e2; font-size: 14px; }
        .plus-btn { cursor: pointer; font-size: 24px; color: #aaa; }
    </style>
</head>
<body>

    <h1>على ماذا يجب أن نركّز؟</h1>

    <div class="input-container">
        <span class="icon">🎤</span>
        <div class="model-selector">Flash-Lite <span>▼</span></div>
        <input type="text" id="userInput" placeholder="اسأل Gemini...">
        <span class="plus-btn" id="sendBtn">+</span>
    </div>

    <script>
        // هنا غادي نربطو كل زر بـ function
        document.getElementById('sendBtn').addEventListener('click', () => {
            const prompt = document.getElementById('userInput').value;
            console.log("جاري البحث عن: " + prompt);
            // غنحطو هنا الـ API Logic من بعد
        });
        
        // تقدري تزيد دابا functions لكل زر (Mic, Model Selector...)
    </script>
</body>
</html>
