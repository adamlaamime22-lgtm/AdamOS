<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AdamOS - Replit Style</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0d0d0d; color: #fff; font-family: sans-serif; }
        
        /* اللوحة المركزية */
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .logo-box { background: #00ff9d; color: #000; padding: 20px; border-radius: 10px; width: 100px; font-weight: bold; }
        .input-area { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .send-btn { background: #00ff9d; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }

        /* القائمة الجانبية (Sidebar) */
        .sidebar { width: 300px; background: #111; border-right: 1px solid #333; padding: 20px; }
        .sidebar-title { color: #00ff9d; font-size: 1.5em; font-weight: bold; margin-bottom: 20px; }
        .new-chat-btn { border: 1px solid #00ff9d; color: #00ff9d; padding: 10px; text-align: center; border-radius: 5px; margin-bottom: 20px; cursor: pointer; }
        .chat-item { background: #1a1a1a; padding: 15px; border-radius: 5px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="logo-box">AdamOS</div>
    <div class="input-area">
        <input type="text" placeholder="اسأل AdamOS..." style="background:none; border:none; color:#fff; width:80%;">
        <button class="send-btn">➔</button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-title">ADAMOS ◰</div>
    <div class="new-chat-btn">+ محادثة جديدة</div>
    <div class="chat-item">AdamOS</div>
</div>

</body>
</html>
