<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
   <style>
    body { 
        background: #050505; 
        color: #fff; 
        font-family: 'Segoe UI', sans-serif; 
        margin: 0; 
        display: flex; 
        height: 100vh; 
    }
    
    /* الـ Sidebar الزجاجي */
    .sidebar { 
        width: 70px; 
        background: rgba(255, 255, 255, 0.05); 
        backdrop-filter: blur(10px);
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding-top: 20px;
    }
    
    .icon { width: 24px; fill: #888; cursor: pointer; margin-bottom: 25px; transition: 0.2s; }
    .icon:hover { fill: #fff; transform: scale(1.1); }

    /* الـ Input Box العصرية */
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .input-box { 
        width: 700px; 
        background: rgba(30, 30, 30, 0.8); 
        padding: 18px 25px; 
        border-radius: 30px; 
        display: flex; 
        align-items: center; 
        gap: 15px;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    input { 
        flex: 1; 
        background: none; 
        border: none; 
        color: white; 
        outline: none; 
        font-size: 17px; 
        text-align: right; 
    }
    h1 { font-weight: 300; margin-bottom: 30px; color: #eee; }
</style>
</head>
<body>

    <aside class="sidebar">
        <svg class="icon" onclick="console.log('جديد')" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
        <svg class="icon" onclick="console.log('بحث')" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z"/></svg>
    </aside>

    <main class="main">
        <h1>على ماذا يجب أن نركّز؟</h1>
        <div class="input-box">
            <svg class="icon" onclick="startMic()" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zM17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            <input type="text" id="userInput" placeholder="اسأل VELOX AI..." onkeydown="handleEnter(event)">
        </div>
    </main>

    <script>
        const input = document.getElementById('userInput');

        // 1. الإرسال بـ Enter
        function handleEnter(e) {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                console.log("VELOX AI: جاري الإرسال: " + input.value);
                input.value = "";
            }
        }

        // 2. الميكروفون
        function startMic() {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'ar-MA';
            rec.start();
            rec.onresult = (e) => { input.value = e.results[0][0].transcript; };
            rec.onerror = () => { alert("تأكد من إذن الميكروفون في إعدادات المتصفح!"); };
        }
    </script>
</body>
</html>
