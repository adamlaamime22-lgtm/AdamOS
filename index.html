<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="34ssOmoyBQzUEpdJe12ths9hxim17cte86USfqrnfgw" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox JSON Formatter | Fast JSON Beautifier & Validator</title>
    <meta name="description" content="Velox JSON Formatter: A professional, ultra-fast JSON beautifier, validator, and converter. Real-time syntax checking, glassmorphism UI, and secure client-side processing.">
    <meta name="keywords" content="Fast JSON Formatter, JSON Beautifier, JSON Validator, Velox JSON, Online JSON Tool">
    <meta name="author" content="Adam Laamime">
    <meta name="apple-mobile-web-app-title" content="VELOX">
    </head>
    <style>
        /* 
         * CORE CSS VARIABLES & RESET 
         */
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --danger: #ef4444;
            --success: #22c55e;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --code-key: #93c5fd; /* Light Blue */
            --code-string: #86efac; /* Light Green */
            --code-number: #fca5a5; /* Light Red */
            --code-boolean: #c4b5fd; /* Light Purple */
            --code-null: #94a3b8; /* Gray */
            --font-ui: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-code: 'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll, let panels scroll */
        }

        /* 
         * UTILITIES & GLASSMORPHISM 
         */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--glass-highlight);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #0f172a;
            border: none;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            color: #fff;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* 
         * LAYOUT 
         */
        header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        main {
            flex: 1;
            display: flex;
            padding: 0 2rem 2rem 2rem;
            gap: 2rem;
            min-height: 0; /* Flexbox scroll fix */
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .editor-header {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .editor-body {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* 
         * INPUT & OUTPUT AREAS 
         */
        textarea#jsonInput {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: var(--font-code);
            font-size: 14px;
            line-height: 1.5;
            padding: 1rem;
            resize: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Output View */
        #outputView {
            width: 100%;
            height: 100%;
            overflow: auto;
            padding: 1rem;
            font-family: var(--font-code);
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap; /* Wrap text */
        }

        /* Syntax Highlighting Classes */
        .json-key { color: var(--code-key); }
        .json-string { color: var(--code-string); }
        .json-number { color: var(--code-number); }
        .json-boolean { color: var(--code-boolean); }
        .json-null { color: var(--code-null); font-style: italic; }

        /* 
         * STATUS BAR & FOOTER 
         */
        .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.9);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
        }
        .status-valid { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-error { background-color: var(--danger); box-shadow: 0 0 8px var(--danger); }

        footer {
            text-align: center;
            padding: 0.8rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.5);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--success);
            color: #fff;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* 
         * RESPONSIVE 
         */
        @media (max-width: 768px) {
            main {
                flex-direction: column;
                padding: 1rem;
                overflow-y: auto;
            }
            body {
                overflow: auto;
            }
            .editor-container {
                min-height: 400px;
            }
            .action-group {
                display: none; /* Simplify mobile view if needed, or make scrollable */
            }
        }
    </style>
</head>
<body>

    <!-- Notification Toast -->
    <div id="toast" class="toast">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span id="toastMsg">Action Successful</span>
    </div>

    <header>
        <div class="brand">
            <div class="brand-icon">{}</div>
            <h1>Velox JSON Formatter</h1>
        </div>
        <div class="action-group">
            <!-- Could add GitHub link or social icons here -->
        </div>
    </header>

    <main>
        <!-- INPUT SECTION -->
        <section class="editor-container glass-panel">
            <div class="editor-header">
                <span class="label">Raw JSON Input</span>
                <div style="display: flex; gap: 8px;">
                    <button class="btn" onclick="clearInput()">Clear</button>
                    <button class="btn" onclick="loadSample()">Sample</button>
                </div>
            </div>
            <div class="editor-body">
                <textarea id="jsonInput" placeholder="Paste or type your JSON here..." spellcheck="false"></textarea>
            </div>
            <div class="status-bar">
                <div id="inputStatusDot" class="status-indicator"></div>
                <span id="inputStatusText">Waiting for input...</span>
            </div>
        </section>

        <!-- OUTPUT SECTION -->
        <section class="editor-container glass-panel">
            <div class="editor-header">
                <span class="label">Formatted Output</span>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" onclick="formatJson()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="3" y2="18"></line></svg>
                        Format
                    </button>
                    <button class="btn" onclick="minifyJson()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"></polyline><polyline points="20 10 14 10 14 4"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                        Minify
                    </button>
                    <button class="btn" onclick="copyToClipboard()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy
                    </button>
                    <button class="btn" onclick="downloadJson()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Download
                    </button>
                </div>
            </div>
            <div class="editor-body">
                <div id="outputView"></div>
            </div>
            <div class="status-bar">
                <span id="outputStats">0 chars | 0 lines</span>
            </div>
        </section>
    </main>

    <footer>
        Engineered by Adam Laamime
    </footer>

    <script>
        /**
         * VELOX JSON FORMATTER
         * Professional Core Logic
         */

        const inputEl = document.getElementById('jsonInput');
        const outputEl = document.getElementById('outputView');
        const inputStatusDot = document.getElementById('inputStatusDot');
        const inputStatusText = document.getElementById('inputStatusText');
        const outputStats = document.getElementById('outputStats');
        const toastEl = document.getElementById('toast');
        const toastMsgEl = document.getElementById('toastMsg');

        let currentJsonString = "";

        // --- Event Listeners ---

        // Debounced real-time validation
        let debounceTimer;
        inputEl.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(validateInput, 500); // 500ms delay
        });

        // --- Core Functions ---

        function validateInput() {
            const raw = inputEl.value.trim();
            if (!raw) {
                setStatus('waiting');
                outputEl.innerHTML = '';
                outputStats.innerText = '0 chars | 0 lines';
                return;
            }

            try {
                JSON.parse(raw);
                setStatus('valid');
                // Optional: Auto-format on valid pause? 
                // For now, let's just validate as requested, but keep output empty until Format is clicked
                // or update silently. Let's wait for user to click Format to avoid UI jumping.
            } catch (e) {
                setStatus('error', e.message);
            }
        }

        function formatJson() {
            const raw = inputEl.value.trim();
            if (!raw) {
                showToast('Please enter JSON first', 'error');
                return;
            }

            try {
                const parsed = JSON.parse(raw);
                // Pretty print with 4 spaces
                currentJsonString = JSON.stringify(parsed, null, 4);
                renderOutput(currentJsonString);
                setStatus('valid');
                showToast('Formatted Successfully');
            } catch (e) {
                setStatus('error', e.message);
                // Highlight error visualization could go here
            }
        }

        function minifyJson() {
            const raw = inputEl.value.trim();
            if (!raw) {
                showToast('Please enter JSON first', 'error');
                return;
            }

            try {
                const parsed = JSON.parse(raw);
                currentJsonString = JSON.stringify(parsed);
                renderOutput(currentJsonString);
                setStatus('valid');
                showToast('Minified Successfully');
            } catch (e) {
                setStatus('error', e.message);
            }
        }

        /**
         * Renders the JSON string with syntax highlighting
         */
        function renderOutput(jsonString) {
            // Escape HTML characters first to prevent XSS
            let safeHtml = jsonString.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Apply Regex coloring
            // 1. Strings (keys and values)
            // Note: This simple regex handles most cases. 
            // Order matters: Keys usually end with ':', values don't.
            safeHtml = safeHtml.replace(/"(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)/g, (match) => {
                return '<span class="json-key">' + match.slice(0, -1) + '</span>' + match.slice(-1);
            });
            
            safeHtml = safeHtml.replace(/"(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"/g, '<span class="json-string">"$1"</span>');
            
            // Re-fix the string replacement logic (simpler approach):
            // Let's restart the coloring logic on the clean string to be safer and more precise.
            
            // Reset
            let html = jsonString;
            
            // HTML Escape
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Numbers
            html = html.replace(/\b(-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)\b/g, '<span class="json-number">$1</span>');

            // Booleans & Null
            html = html.replace(/\b(true|false)\b/g, '<span class="json-boolean">$1</span>');
            html = html.replace(/\b(null)\b/g, '<span class="json-null">$1</span>');

            // Strings (Keys)
            // Looks for "text": (key pattern)
            html = html.replace(/<span class="json-number">-?\d+<\/span>(\s*:)?/g, (match) => {
                // temporary fix to undo number formatting if it was part of a string (unlikely with \b) but regex is tricky.
                // Actually, let's stick to standard formatting:
                return match; 
            });

            // Complex string replacement to differentiate keys vs values
            // We iterate character by character or use a tokenizer. 
            // For this constraints, a smart regex is fastest:
            
            // Re-processing string tokens
            html = html.replace(/"(?:[^"\\]|\\.)*"/g, function(match) {
                // If it ends with ':', it's a key (most likely)
                // But we are in the middle of HTML, so we look at the raw string match.
                // We need to peek ahead in the original string, but here we just look at the match itself.
                // Simplified: If the match itself has a colon at the end? No, colon is outside quotes.
                
                // Heuristic: Check what follows in the HTML stream.
                return '<span class="json-string">' + match + '</span>';
            });

            // Key Highlighting: Find pattern "span class="json-string">..."</span> followed by : 
            html = html.replace(/<span class="json-string">"(.*?)"<\/span>(\s*:)/g, function(match, p1, p2) {
                return '<span class="json-key">"' + p1 + '"</span>' + p2;
            });

            outputEl.innerHTML = html;
            
            // Update stats
            outputStats.innerText = `${jsonString.length} chars | ${jsonString.split('\n').length} lines`;
        }

        // --- Utility Functions ---

        function setStatus(state, msg = "") {
            inputStatusDot.className = 'status-indicator';
            if (state === 'valid') {
                inputStatusDot.classList.add('status-valid');
                inputStatusText.innerText = 'Valid JSON';
                inputStatusText.style.color = 'var(--success)';
            } else if (state === 'error') {
                inputStatusDot.classList.add('status-error');
                inputStatusText.innerText = 'Error: ' + msg;
                inputStatusText.style.color = 'var(--danger)';
            } else {
                inputStatusText.innerText = 'Waiting for input...';
                inputStatusText.style.color = 'var(--text-muted)';
            }
        }

        function copyToClipboard() {
            if (!currentJsonString) {
                // Try to copy raw input if no formatted version exists yet
                currentJsonString = inputEl.value;
            }
            if (!currentJsonString) return;

            navigator.clipboard.writeText(currentJsonString).then(() => {
                showToast('Copied to Clipboard');
            }).catch(err => {
                showToast('Failed to copy', 'error');
                console.error(err);
            });
        }

        function downloadJson() {
            if (!currentJsonString) {
                // Attempt to format first if empty
                formatJson();
            }
            if (!currentJsonString) {
                showToast('No valid JSON to download', 'error');
                return;
            }

            const blob = new Blob([currentJsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'formatted-data.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('Download Started');
        }

        function clearInput() {
            inputEl.value = '';
            outputEl.innerHTML = '';
            currentJsonString = '';
            setStatus('waiting');
            inputEl.focus();
        }

        function loadSample() {
            const sample = {
                "project": "Velox JSON Formatter",
                "version": 2.0,
                "features": [
                    "Syntax Validation",
                    "Beautify",
                    "Minify",
                    "Download"
                ],
                "settings": {
                    "theme": "Glassmorphism",
                    "darkMode": true,
                    "author": "Adam Laamime"
                },
                "isAwesome": true
            };
            inputEl.value = JSON.stringify(sample); // Load raw string
            validateInput();
            formatJson(); // Auto format sample
        }

        function showToast(message, type = 'success') {
            toastMsgEl.innerText = message;
            toastEl.style.background = type === 'error' ? 'var(--danger)' : 'var(--success)';
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 3000);
        }

        // Initialize with focus
        inputEl.focus();

    </script>  
</body>
</html>
