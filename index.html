<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AdamOS</title>
    <style>
        body { background: #131314; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; }
        .input-area { padding: 20px; background: #222; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسأل AdamOS...">
        <button id="sendBtn">إرسال</button>
    </div>

    <script>
    const API_URL = "/api/chat";

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const text = input.value;
            if(!text) return;

            chatBox.innerHTML += `<p>أنت: ${text}</p>`;
            input.value = "";

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            chatBox.innerHTML += `<p>AdamOS: ${aiText}</p>`;
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
    </script>
</body>
</html>
