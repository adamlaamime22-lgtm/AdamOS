<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOX | Real System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* نفس التصميم السابق، سأضع الخلاصة المهمة هنا */
        :root { --primary: #6366f1; --bg: #0f172a; --glass: rgba(30,41,59,0.8); }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 0; }
        .glass { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; backdrop-filter: blur(10px); padding: 20px; }
        .btn { background: var(--primary); border: none; padding: 10px 20px; color: white; border-radius: 6px; cursor: pointer; }
        .hidden { display: none !important; }
        .tool-box { margin-top: 20px; }
        textarea { width: 100%; height: 150px; background: rgba(0,0,0,0.3); border: 1px solid #333; color: #0f0; padding: 10px; border-radius: 6px; font-family: monospace; }
        .login-container { max-width: 400px; margin: 100px auto; text-align: center; }
        .dashboard { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .sidebar { height: 90vh; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <!-- صفحة الدخول -->
    <div id="login-page" class="login-container glass">
        <h1>VELOX</h1>
        <input type="text" id="username" placeholder="اسم المستخدم" style="padding: 10px; width: 100%; margin: 10px 0; border-radius: 5px; border:none;">
        <select id="role-select" style="padding: 10px; width: 100%; margin: 10px 0; border-radius: 5px; border:none;">
            <option value="developer">مطور (Developer)</option>
            <option value="accountant">محاسب (Accountant)</option>
        </select>
        <button class="btn" onclick="login()" style="width: 100%;">دخول آمن</button>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard-page" class="dashboard hidden">
        <!-- القائمة الجانبية -->
        <aside class="glass sidebar">
            <h3>VELOX</h3>
            <div class="nav-item active" onclick="showTool('json')">JSON Formatter</div>
            <div class="nav-item" onclick="showTool('api')">API Tester</div>
            <div class="nav-item" onclick="showTool('vault')">الخزنة المشفرة</div>
            <div class="nav-item" onclick="logout()" style="margin-top: auto; color: #ef4444;">خروج</div>
        </aside>

        <!-- المحتوى -->
        <main class="glass" style="height: 90vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h2 id="user-greeting">مرحباً</h2>
                <span id="user-badge" style="background: var(--primary); padding: 2px 8px; border-radius: 4px; font-size: 12px;">ROLE</span>
            </div>

            <!-- 1. أداة JSON Formatter (تعمل فعلياً) -->
            <div id="tool-json" class="tool-box">
                <h3>أداة تنسيق JSON (Real Tool)</h3>
                <textarea id="json-input" placeholder="الصق كود JSON هنا..."></textarea>
                <button class="btn" onclick="formatJSON()">تنسيق (Format)</button>
                <button class="btn" style="background: #ef4444;" onclick="document.getElementById('json-input').value=''">مسح</button>
            </div>

            <!-- 2. أداة API Tester (تعمل فعلياً) -->
            <div id="tool-api" class="tool-box hidden">
                <h3>اختبار API (Real Tool)</h3>
                <input type="text" id="api-url" value="https://jsonplaceholder.typicode.com/todos/1" style="width: 70%; padding: 10px;">
                <button class="btn" onclick="testAPI()">إرسال طلب (GET)</button>
                <pre id="api-result" style="background: #000; color: #0f0; padding: 15px; margin-top: 10px; border-radius: 6px; overflow: auto;"></pre>
            </div>

            <!-- 3. الخزنة (متصلة بالسيرفر) -->
            <div id="tool-vault" class="tool-box hidden">
                <h3>الخزنة المشفرة (Server Encrypted)</h3>
                <p style="color: #94a3b8; font-size: 0.9rem;">البيانات يتم تشفيرها وحفظها في ملف users.json على السيرفر.</p>
                <textarea id="vault-input" placeholder="اكتب سراً هنا..."></textarea>
                <button class="btn" onclick="saveVault()">حفظ في السيرفر (Encrypted)</button>
                <button class="btn" onclick="loadVault()">استرجاع من السيرفر (Decrypt)</button>
                <p id="vault-msg" style="margin-top: 10px; color: var(--primary);"></p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
