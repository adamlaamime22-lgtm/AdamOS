<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VELOX</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background-color: #0d0d0d; color: #fff; font-family: sans-serif; }
        
        /* Sidebar (اليمين) */
        .sidebar { width: 280px; padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .logo { margin-bottom: 30px; }
        .logo img { width: 150px; }
        .historique { flex: 1; margin-top: 20px; color: #888; font-size: 0.9em; }
        .new-chat { background: #1a1a1a; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; border: 1px solid #333; }

        /* Main Area (اليسار) */
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .input-box { width: 600px; background: #1a1a1a; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: none; border: none; color: #fff; outline: none; }
        .mic-icon { cursor: pointer; color: #6f42c1; font-size: 1.2em; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <img src="image_7cca9f.png" alt="VELOX Logo">
        </div>
        <div class="new-chat">+ محادثة جديدة</div>
        <div class="historique">
            <p>سجل المحادثات:</p>
            <ul>
                <li>محادثة قديمة 1</li>
                <li>محادثة قديمة 2</li>
            </ul>
        </div>
    </aside>

    <main class="main-content">
        <h1>مرحباً بك في VELOX</h1>
        <div class="input-box">
            <input type="text" placeholder="اكتب سؤالك لـ VELOX...">
            <span class="mic-icon">🎤</span>
        </div>
    </main>

</body>
</html>
