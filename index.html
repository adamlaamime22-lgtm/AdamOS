<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox AI | نظام الذكاء الاصطناعي المتقدم</title>
    
    <!-- تحميل مكتبة Transformers.js من CDN -->
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';
        
        // إعدادات البيئة للتشغيل المحلي بدون خوادم وسيطة
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        // تصدير المكتبة إلى النطاق العام لاستخدامها في كود التطبيق
        window.Transformers = { pipeline, env };
    </script>

    <style>
        /* =========================================
           1. الملف: style.css (Glassmorphism UI)
           ========================================= */
        
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --glass-blur: 25px;
            --primary-accent: #38bdf8; /* أزرق سماوي تقني */
            --danger-accent: #ef4444;
            --success-accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* حاوية التطبيق الرئيسية */
        #app-container {
            width: 95%;
            height: 95%;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            border: var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* الشريط الجانبي (Sidebar) */
        .sidebar {
            width: 300px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-left: var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s ease;
            z-index: 10;

        .brand {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-accent);
            margin-bottom: 30px;
            display: flex;

            gap: 10px;
        }

        .brand span { color: #fff; }

        .status-card {

        .status-ready { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.4); }

        .sidebar-menu {

        }

        .menu-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        /* منطقة المحادثة (Chat Area) */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .chat-history {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* تنسيق الرسائل */

            max-width: 80%;
            padding: 15px 20px;
            border-radius: 16px;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease;
            font-size: 15px;

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .message.user {
            align-self: flex-end;
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #fff;
            border-bottom-right-radius: 2px;
        }

        .message.ai {
            align-self: flex-start;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: var(--glass-border);
            color: #e2e8f0;
            border-bottom-left-radius: 2px;
        }

        .typing-cursor::after {
            content: '▋';
            animation: blink 1s step-start infinite;
            color: var(--primary-accent);
            margin-left: 2px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* منطقة الإدخال (Input Area) */
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            border-top: var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-wrapper {
            flex-grow: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
            resize: none;
            height: 56px;
            transition: all 0.3s;
            max-height: 150px;
        }

        textarea:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(56, 189, 248, 0.5);
        }

        .btn-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .btn-icon:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
        
        .btn-send {
            background: var(--primary-accent);
            color: #0f172a;
            font-weight: bold;
        }

        .btn-send:hover { background: #0ea5e9; }
        .btn-send:disabled { background: #475569; cursor: not-allowed; color: #94a3b8; }

        .btn-mic.listening {
            background: var(--danger-accent);
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* نظام التنبيهات (Toast Notifications) */
        #toast-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 300px;
            animation: slideDown 0.3s ease;
        }

        .toast.error { border-right: 4px solid var(--danger-accent); }
        .toast.success { border-right: 4px solid var(--success-accent); }
        .toast.info { border-right: 4px solid var(--primary-accent); }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; transform: translateX(100%); }
            .sidebar.open { transform: translateX(0); }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>

            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 12 2.1 12.1"></path><path d="M12 12 18.4 5.6"></path></svg>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">

            <div class="chat-history" id="chat-history">
                <!-- الرسائل ستظهر هنا -->
                <div class="message ai">
                    مرحباً. أنا Velox AI، مساعدك التقني الذكي. تم تهيئة النظام المحلي بنجاح. كيف يمكنني مساعدتك اليوم؟

    <script type="module">
        /* =========================================
           2. الملف: script.js (المنطق البرمجي)
           ========================================= */

        // --- قاعدة المعرفة المحلية (Local Knowledge RAG) ---
        // محاكاة لمحتوى ملف knowledge_base.txt
        const KNOWLEDGE_BASE_CONTENT = `
            أخبار تقنية 2026: أعلنت شركة "آدم تك" عن معالج عصبي جديد قادر على أداء 500 تريليون عملية في الثانية.
            Velox AI: هو مساعد تقني طوره المهندس آدم. يعمل بالكامل داخل المتصفح باستخدام نماذج T5.
            ملاحظات النظام: النظام يستخدم IndexedDB لتخزين البيانات بشكل آمن ومحلي.
            بروتوكول الأمان: جميع البيانات تبقى داخل جهاز المستخدم ولا يتم إرسالها لأي خادم خارجي.
            تحديثات النظام: دعم WebGPU قيد التطوير للإصدار القادم لزيادة سرعة الاستنتاج.
        `;

        class KnowledgeBase {
            static search(query) {
                const lowerQuery = query.toLowerCase();
                // تقسيم النص لأسطر للبحث البسيط
                const lines = KNOWLEDGE_BASE_CONTENT.split('\n').filter(line => line.trim() !== '');
                const relevantContext = lines.filter(line => 
                    line.toLowerCase().includes(lowerQuery) || 
                    (lowerQuery.length > 3 && line.toLowerCase().includes(lowerQuery.substring(0, 3)))
                );
                
                if (relevantContext.length > 0) {
                    return `معلومات من قاعدة المعرفة:\n${relevantContext.join('\n')}`;
                }
                return "";
            }
        }

        // --- طبقة قاعدة البيانات (IndexedDB Wrapper) ---
        class VeloxDB {
            constructor(dbName, version) {
                this.dbName = dbName;
                this.version = version;
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('settings')) {
                            db.createObjectStore('settings', { keyPath: 'key' });
                        }
                        if (!db.objectStoreNames.contains('history')) {
                            db.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
                        }
                    };

                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        resolve(this.db);
                    };

                    request.onerror = (event) => {
                        UI.showToast('فشل الاتصال بقاعدة البيانات', 'error');
                        reject(event.target.error);
                    };
                });
            }

            // CRUD Operations
            async getData(storeName, key) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([storeName], 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result ? request.result.value : null);
                    request.onerror = () => reject(request.error);
                });
            }

            async putData(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([storeName], 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.put(data);
                    request.onsuccess = () => resolve(true);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAllHistory() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['history'], 'readonly');
                    const store = transaction.objectStore('history');
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async clearHistory() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['history'], 'readwrite');
                    const store = transaction.objectStore('history');
                    const request = store.clear();
                    request.onsuccess = () => resolve(true);
                    request.onerror = () => reject(request.error);
                });
            }
        }

        // --- محرك الذكاء الاصطناعي (Transformers.js) ---
        class AIEngine {
            constructor() {
                this.generator = null;
                this.isModelLoaded = false;
            }

            async loadModel() {
                if (this.isModelLoaded) return;
                try {
                    // استخدام النموذج المطلوب LaMini-Flan-T5-248M
                    // ملاحظة: إذا فشل التحميل بسبب الحجم، يمكن استخدام بديل أخف مثل Xenova/flan-t5-small
                    const modelId = 'Xenova/LaMini-Flan-T5-248M'; 
                    
                    // التحقق من وجود المكتبة
                    if (!window.Transformers) {
                        throw new Error("مكتبة Transformers.js لم يتم تحميلها بعد.");
                    }

                    UI.showToast('جاري تحميل النموذج الذكي... قد يستغرق وقتاً', 'info');
                    
                    this.generator = await window.Transformers.pipeline('text2text-generation', modelId, {
                        progress_callback: (data) => {
                            if (data.status === 'progress') {
                                console.log(`Loading: ${data.file} ${data.progress}%`);
                            }
                        }
                    });

                    this.isModelLoaded = true;
                    UI.updateSystemStatus(true);
                    UI.showToast('تم تحميل النموذج بنجاح', 'success');
                } catch (error) {
                    console.error(error);
                    UI.showToast(`فشل تحميل النموذج: ${error.message}`, 'error');
                    UI.updateSystemStatus(false);
                }
            }

            async generateResponse(inputText) {
                if (!this.isModelLoaded) {
                    await this.loadModel();
                    if (!this.isModelLoaded) return "عذراً، النموذج غير جاهز.";
                }

                // محرك الاستنتاج المنطقي (Reasoning Engine Simulation)
                const reasoning = this.analyzeIntent(inputText);
                
                // البحث في قاعدة المعرفة
                const context = KnowledgeBase.search(inputText);

                // بناء الـ Prompt
                const systemPrompt = "أنت Velox AI، مساعد تقني ابتكره آدم لعموم. إجاباتك تقنية، رسمية، تحليلية، وممنوع نهائياً استخدام الإيموجي أو التعبير الطفولي.";
                const fullPrompt = `${systemPrompt}\n\nالسياق:\n${context}\n\nالسؤال: ${inputText}\n\nالإجابة:`;

                try {
                    const output = await this.generator(fullPrompt, {
                        max_new_tokens: 256,
                        temperature: 0.7,
                        do_sample: true,
                        top_k: 50
                    });
                    return output[0].generated_text;
                } catch (error) {
                    console.error(error);
                    return "حدث خطأ أثناء المعالجة التحليلية.";
                }
            }

            // دالة تحليل القصد البسيطة
            analyzeIntent(text) {
                if (text.length < 5) return "ambiguous";
                if (text.includes("مرحبا") || text.includes("السلام")) return "greeting";
                return "technical_query";
            }
        }

        // --- طبقة واجهة المستخدم والتفاعل (UI & Speech) ---
        class UI {
            constructor() {
                this.elements = {
                    chatHistory: document.getElementById('chat-history'),
                    userInput: document.getElementById('user-input'),
                    sendBtn: document.getElementById('send-btn'),
                    micBtn: document.getElementById('mic-btn'),
                    guestIdDisplay: document.getElementById('display-guest-id'),
                    systemStatus: document.getElementById('system-status'),
                    toastContainer: document.getElementById('toast-container')
                };
                
                this.isRecording = false;
                this.synthesis = window.speechSynthesis;
            }

            static showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                // أيقونات بسيطة
                let icon = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
                toast.innerHTML = `<span>${icon}</span><span>${message}</span>`;
                
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            }

            updateSystemStatus(isReady) {
                if (isReady) {
                    this.elements.systemStatus.className = 'system-badge status-ready';
                    this.elements.systemStatus.innerText = 'النظام متصل (Online)';
                } else {
                    this.elements.systemStatus.className = 'system-badge status-loading';
                    this.elements.systemStatus.innerText = 'جاري التحميل...';
                }
            }

            addMessage(text, sender) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${sender}`;
                this.elements.chatHistory.appendChild(msgDiv);
                
                if (sender === 'ai') {
                    this.typeWriterEffect(msgDiv, text);
                } else {
                    msgDiv.innerText = text;
                    this.elements.chatHistory.scrollTop = this.elements.chatHistory.scrollHeight;
                }
            }

            typeWriterEffect(element, text) {
                let index = 0;
                element.classList.add('typing-cursor');
                const speed = 20; // سرعة الكتابة

                const type = () => {
                    if (index < text.length) {
                        element.textContent += text.charAt(index);
                        index++;
                        this.elements.chatHistory.scrollTop = this.elements.chatHistory.scrollHeight;
                        setTimeout(type, speed);
                    } else {
                        element.classList.remove('typing-cursor');
                    }
                };
                type();
            }

            setupListeners(aiCore, db) {
                // إرسال النص
                this.elements.sendBtn.addEventListener('click', () => this.handleSend(aiCore, db));
                
                // الضغط على Enter
                this.elements.userInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.handleSend(aiCore, db);
                    }
                });

                // الميكروفون
                this.elements.micBtn.addEventListener('click', () => this.toggleSpeechRecognition(aiCore, db));
            }

            async handleSend(aiCore, db) {
                const text = this.elements.userInput.value.trim();
                if (!text) return;

                if (!aiCore.isModelLoaded) {
                    UI.showToast('يرجى انتظار تحميل النموذج...', 'error');
                    aiCore.loadModel();
                    return;
                }

                // 1. عرض رسالة المستخدم
                this.addMessage(text, 'user');
                this.elements.userInput.value = '';
                this.elements.sendBtn.disabled = true;

                // 2. حفظ في قاعدة البيانات
                await db.putData('history', { role: 'user', content: text, timestamp: Date.now() });

                // 3. توليد الرد
                setTimeout(async () => {
                    this.addMessage('جاري التحليل...', 'ai'); // مؤقت
                    const response = await aiCore.generateResponse(text);
                    
                    // إزالة مؤقت التحليل وإضافة الرد الحقيقي (للتبسيط سنقوم بإضافة رسالة جديدة وتجاهل المؤقت أو تعديله)
                    // هنا سنعيد إضافة الرسالة بشكل صحيح
                    this.elements.chatHistory.lastElementChild.remove(); 
                    this.addMessage(response, 'ai');
                    
                    // حفظ الرد
                    await db.putData('history', { role: 'ai', content: response, timestamp: Date.now() });
                    this.elements.sendBtn.disabled = false;
                }, 500);
            }

            toggleSpeechRecognition(aiCore, db) {
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    UI.showToast('المتصفح لا يدعم تحويل الصوت لنص', 'error');
                    return;
                }

                if (this.isRecording) {
                    this.recognition.stop();
                    return;
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                this.recognition = new SpeechRecognition();
                this.recognition.lang = 'ar-SA';
                this.recognition.interimResults = false;
                this.recognition.maxAlternatives = 1;

                this.recognition.onstart = () => {
                    this.isRecording = true;
                    this.elements.micBtn.classList.add('listening');
                    UI.showToast('جاري الاستماع...', 'info');
                };

                this.recognition.onend = () => {
                    this.isRecording = false;
                    this.elements.micBtn.classList.remove('listening');
                };

                this.recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    this.elements.userInput.value = transcript;
                    this.handleSend(aiCore, db);
                };

                this.recognition.start();
            }
        }

        // --- تهيئة التطبيق (Application Bootstrapper) ---
        const db = new VeloxDB('VeloxAI_DB', 1);
        const ui = new UI();
        const ai = new AIEngine();

        window.app = {
            clearChat: async () => {
                ui.elements.chatHistory.innerHTML = '';
                await db.clearHistory();
                UI.showToast('تم مسح سجل المحادثات', 'success');
            },
            exportData: async () => {
                const history = await db.getAllHistory();
                console.log(history);
                UI.showToast(`تم تصدير ${history.length} رسائل للكونسول`, 'success');
            },
            showSettings: () => UI.showToast('لوحة الإعدادات قيد التطوير', 'info')
        };

        // نقطة البداية
        (async () => {
            try {
                await db.init();
                
                // توليد أو استرجاع Guest ID
                let guestId = await db.getData('settings', 'guest_id');
                if (!guestId) {
                    guestId = 'GUEST-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                    await db.putData('settings', { key: 'guest_id', value: guestId });
                }
                ui.elements.guestIdDisplay.innerText = guestId;

                // تحميل النموذج في الخلفية
                ai.loadModel();

                // استرجاع السجل السابق
                const history = await db.getAllHistory();
                if (history.length > 0) {
                    ui.elements.chatHistory.innerHTML = '';
                    history.forEach(msg => ui.addMessage(msg.content, msg.role));
                }

                // تفعيل الواجهة
                ui.setupListeners(ai, db);

            } catch (e) {
                console.error("Critical Error:", e);
                UI.showToast('فشل في بدء تشغيل النظام', 'error');
            }
        })();

    </script>
</body>
</html>
