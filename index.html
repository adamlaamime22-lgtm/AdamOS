<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VELOX AI</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; background: #131314; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* السايدبار */
        .sidebar { width: 280px; background: rgba(255, 255, 255, 0.03); padding: 20px; display: flex; flex-direction: column; gap: 20px; border-left: 1px solid rgba(255,255,255,0.05); }
        
        /* المحتوى الرئيسي */
        .main { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 40px; }
        
        /* منطقة الشات */
        #chatBox { width: 700px; height: 70vh; overflow-y: auto; margin-bottom: 20px; padding: 10px; }
        .message { background: #2b2b2b; padding: 10px; border-radius: 10px; margin-bottom: 10px; width: fit-content; }
        
        /* مربع الإدخال */
        .input-box { width: 700px; background: #2b2b2b; padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 10px; border: none; background: #4a4a4a; color: white; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="margin: 0; color: #fff;">VELOX AI</h2>
    <button onclick="location.reload()">+ محادثة جديدة</button>
    <div style="color: #666; font-size: 0.8em;">سجل المحادثات...</div>
</aside>

<main class="main">
    <div id="chatBox"></div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="اسأل VELOX...">
        <button id="sendBtn">إرسال</button>
    </div>
</main>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = 'message';
        div.style.alignSelf = sender === 'user' ? 'flex-end' : 'flex-start';
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.addEventListener('click', () => {
        const text = userInput.value;
        if (text.trim() === "") return;
        
        addMessage(text, 'user');
        userInput.value = "";

        // جواب تجريبي من VELOX
        setTimeout(() => {
            addMessage("أنا VELOX، تلقيت رسالتك: " + text, 'ai');
        }, 500);
    });

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });
</script>

</body>
</html>
