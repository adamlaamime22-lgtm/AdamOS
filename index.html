<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VELOX AI</title>
    <style>
        body { margin: 0; height: 100vh; background: #0b0c0f; color: #e0e0e0; font-family: sans-serif; display: flex; }
        .sidebar { width: 60px; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; border-left: 1px solid #222; }
        .icon-svg { width: 24px; height: 24px; fill: #aaa; cursor: pointer; transition: 0.3s; }
        .icon-svg:hover { fill: white; }
        .settings-icon { margin-top: auto; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .input-container { width: 700px; background: #1e1f20; padding: 15px 25px; border-radius: 50px; display: flex; align-items: center; gap: 15px; }
        .plus-btn { cursor: pointer; fill: #aaa; width: 24px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; text-align: right; }
        .model-selector { cursor: pointer; display: flex; align-items: center; gap: 5px; color: #4a90e2; font-size: 14px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg> <!-- Edit -->
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg> <!-- Search -->
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg> <!-- Grid -->
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 13l-10-5 10-5 10 5-10 5z"/></svg> <!-- Diamond -->
        <svg class="icon-svg settings-icon" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.63l-1.92-3.32c-.12-.22-.37-.31-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.63l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.63l1.92 3.32c.12.22.37.31.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.04.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.63l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg> <!-- Settings -->
    </aside>

    <main class="main-content">
        <h1>على ماذا يجب أن نركّز؟</h1>
        <div class="input-container">
            <svg class="plus-btn" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <input type="text" id="userInput" placeholder="اسأل VELOX AI...">
            <div class="model-selector">Flash-Lite <span>▼</span></div>
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zM17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </div>
    </main>

</body>
</html>
<script>
    // هاد الكود كيقلب على أي حاجة كليكيتي عليها ويشوف واش هي زر
    document.addEventListener('click', function(e) {
        // نشوفو واش تكليكا على أيقونة
        const target = e.target.closest('.icon-svg, .plus-btn, .model-selector');
        
        if (target) {
            if (target.classList.contains('plus-btn')) {
                const input = document.getElementById('userInput');
                console.log("إرسال: " + input.value);
                input.value = "";
            } else if (target.classList.contains('model-selector')) {
                alert("تبديل النموذج...");
            } else {
                console.log("تم الضغط على أيقونة جانبية أو ميكروفون");
            }
        }
    });
</script>
