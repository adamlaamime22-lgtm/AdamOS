<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 1. الهوية البصرية (Glassmorphism & Branding) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VELOX JSON FORMATTER | The Foundational Statement</title>
    
    <style>
        /* GLASSMORPHISM PALETTE */
        :root {
            --bg-deep: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shine: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6; /* Neon Blue */
            --pro-gold: #fbbf24; /* Neon Gold */
            --danger: #ef4444;
            --success: #10b981;
            
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-code: 'JetBrains Mono', 'Fira Code', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            /* Deep ambient background for glass effect */
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            font-family: var(--font-ui);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* GLASS UTILITY CLASS */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* HEADER */
        header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 50;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-main);
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .brand span { color: var(--accent-blue); }

        /* LAYOUT */
        .container {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        /* SIDEBAR (Desktop) */
        aside {
            width: 260px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 16px;
            overflow-y: auto;
            transition: all 0.3s;
        }

        /* MAIN EDITOR */
        main {
            flex: 1;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .toolbar {
            height: 50px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
            background: rgba(0,0,0,0.2);
        }

        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

        .pane {
            position: relative;
            border-right: 1px solid var(--glass-border);
        }
        .pane:last-child { border-right: none; }

        textarea {
            width: 100%; height: 100%; background: transparent; border: none;
            color: #e2e8f0; font-family: var(--font-code); font-size: 13px;
            padding: 20px; resize: none; line-height: 1.5; outline: none;
        }

        .output {
            width: 100%; height: 100%; overflow: auto;
            padding: 20px; font-family: var(--font-code); font-size: 13px;
            line-height: 1.5; white-space: pre-wrap;
        }

        /* ELEMENTS */
        button {
            background: var(--glass-shine); border: 1px solid var(--glass-border);
            color: var(--text-main); padding: 6px 12px; border-radius: 6px;
            cursor: pointer; font-size: 12px; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        button:hover { background: rgba(255,255,255,0.15); }

        .btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); color: white; }
        .btn-pro { border-color: var(--pro-gold); color: var(--pro-gold); box-shadow: 0 0 10px rgba(251, 191, 36, 0.1); }
        .btn-pro:hover { background: rgba(251, 191, 36, 0.1); box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }

        .section-title {
            font-size: 10px; text-transform: uppercase; color: var(--text-muted);
            margin-bottom: 8px; letter-spacing: 1px; font-weight: 700;
        }

        /* 4. واجهة الدفع (Conversion Hub) */
        .upgrade-box {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%);
            border: 1px solid var(--pro-gold); border-radius: 12px;
            padding: 16px; text-align: center;
        }
        .btn-upgrade {
            width: 100%; justify-content: center; margin-top: 10px;
            background: var(--pro-gold); color: #000; font-weight: 700; border: none;
            text-transform: uppercase; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }

        /* FOOTER */
        footer {
            height: 30px; display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px;
            background: var(--bg-deep); z-index: 50;
        }

        /* MOBILE UI (Drawer & Tabs) */
        .mobile-drawer {
            position: fixed; top: auto; bottom: 0; left: 0; width: 100%;
            height: 70vh; border-radius: 20px 20px 0 0;
            transform: translateY(110%); transition: transform 0.3s;
            z-index: 100; padding: 20px;
        }
        .mobile-drawer.active { transform: translateY(0); }
        
        .mobile-tabs { display: none; gap: 8px; }
        .tab-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }

        @media (max-width: 768px) {
            aside { display: none; }
            .workspace { grid-template-columns: 1fr; }
            .pane { display: none; }
            .pane.active { display: block; }
            .mobile-tabs { display: flex; }
        }

        /* SYNTAX HIGHLIGHTING */
        .key { color: #93c5fd; } .string { color: #86efac; }
        .number { color: #fca5a5; } .boolean { color: #c4b5fd; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .modal {
            background: #1e293b; width: 90%; max-width: 400px; border-radius: 16px;
            padding: 24px; border: 1px solid var(--pro-gold);
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.2);
            text-align: center;
        }
        .solana-box {
            background: #000; color: var(--pro-gold); font-family: var(--font-code);
            padding: 10px; font-size: 10px; word-break: break-all; margin: 16px 0;
            border: 1px dashed var(--pro-gold);
        }
        input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            padding: 12px; color: white; border-radius: 6px; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="glass">
        <div class="brand">VELOX <span>JSON</span></div>
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="proBadge" class="section-title" style="padding:4px 8px; border:1px solid var(--pro-gold); color:var(--pro-gold); display:none;">PRO</div>
            <button class="glass" onclick="toggleDrawer()" style="display:none;" id="menuBtn">☰</button>
        </div>
    </header>

    <!-- CONTAINER -->
    <div class="container">
        
        <!-- SIDEBAR -->
        <aside class="glass" id="sidebar">
            <div class="upgrade-box" id="desktopUpgrade">
                <h3 style="color:var(--pro-gold); font-size:14px;">VELOX PRO</h3>
                <p style="font-size:11px; color:var(--text-muted); margin:5px 0;">Unlock Bulk, AI, & Cloud.</p>
                <button class="btn-upgrade" onclick="openPaymentModal()">UPGRADE NOW</button>
            </div>

            <div class="section-title">Core Tools</div>
            <div style="display:grid; gap:8px;">
                <button onclick="formatJSON()">✨ Format / Validate</button>
                <button onclick="minifyJSON()">📉 Minify</button>
                <button onclick="copyToClipboard()">📋 Copy</button>
                <button onclick="downloadJSON()">💾 Download</button>
            </div>

            <hr style="border:0; border-top:1px solid var(--glass-border);">

            <div class="section-title">VELOX PRO</div>
            <div style="display:grid; gap:8px;">
                <button class="btn-pro" onclick="gatekeeper('Bulk Engine')">⚡ Bulk Engine</button>
                <button class="btn-pro" onclick="gatekeeper('AI Debugger')">🤖 AI Debugger</button>
                <button class="btn-pro" onclick="gatekeeper('Cloud Vault')">☁️ Cloud Vault</button>
                <button class="btn-pro" onclick="gatekeeper('Visual Diff')">📊 Visual Diff</button>
                <button class="btn-pro" onclick="gatekeeper('Analytical Export')">📊 Export SQL/Excel</button>
                <button class="btn-pro" onclick="gatekeeper('Schema Gen')">🛠️ Schema Gen</button>
                <button class="btn-pro" onclick="gatekeeper('History')">🕒 Version History</button>
            </div>
        </aside>

        <!-- MAIN EDITOR -->
        <main class="glass">
            <div class="toolbar">
                <div class="mobile-tabs">
                    <button class="tab-btn active" onclick="switchTab('input')">INPUT</button>
                    <button class="tab-btn" onclick="switchTab('output')">OUTPUT</button>
                </div>
                <div style="flex:1;"></div>
                <!-- Basic Tools for Mobile/Desktop -->
            </div>
            <div class="workspace">
                <div class="pane active" id="pane-input">
                    <textarea id="jsonInput" placeholder="Paste your JSON here..."></textarea>
                </div>
                <div class="pane" id="pane-output">
                    <div id="jsonOutput" class="output"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- MOBILE DRAWER -->
    <div class="glass mobile-drawer" id="mobileDrawer">
        <div style="display:flex; justify-content:space-between;">
            <h3>Tools</h3>
            <button onclick="toggleDrawer()" style="background:none; border:none;">✕</button>
        </div>
        <!-- Replicated sidebar items for mobile -->
        <div style="display:grid; gap:10px; margin-top:20px;">
            <button onclick="formatJSON(); toggleDrawer()">✨ Format</button>
            <button class="btn-pro" onclick="gatekeeper('AI'); toggleDrawer()">🤖 AI Debugger</button>
            <button class="btn-upgrade" onclick="openPaymentModal(); toggleDrawer()">UPGRADE TO PRO</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        VELOX JSON FORMATTER | Developed by Adam Laamime
    </footer>

    <!-- 4. واجهة الدفع (Conversion Hub) -->
    <div class="modal-overlay" id="paymentModal">
        <div class="glass">
            <h2 style="color:var(--pro-gold); margin-bottom:10px;">👑 VELOX PRO</h2>
            <p style="font-size:12px; color:var(--text-muted); margin-bottom:20px;">
                Instant access to Bulk Processing, AI Debugging, and Cloud Vault.
            </p>
            
            <div class="solana-box">
                95vduuDmi3ZNfrbf9ycH1jftiAwrCoESSnkvcpvVfo5W
            </div>
            
            <p style="font-size:11px; text-align:left;">Transaction Signature (TxID):</p>
            <input type="text" id="txHash" placeholder="Paste Signature...">
            
            <button class="btn-upgrade" onclick="verifyPayment()">VERIFY & UNLOCK</button>
            <button onclick="closeModal()" style="width:100%; margin-top:10px; background:transparent; border:none;">Cancel</button>
        </div>
    </div>

    <script>
        // --- STATE ---
        const AppState = {
            isPro: localStorage.getItem('velox_pro_v2') === 'true'
        };

        // --- 2. CORE FREE FEATURES ---
        function formatJSON() {
            const input = document.getElementById('jsonInput').value;
            const output = document.getElementById('jsonOutput');
            if (!input.trim()) return;

            try {
                const obj = JSON.parse(input);
                output.innerHTML = syntaxHighlight(obj);
                showToast("Valid JSON");
            } catch (e) {
                output.innerHTML = `<span style="color:var(--danger)">Error: ${e.message}</span>`;
                // Simplified Line/Col error report
                const errMatch = e.message.match(/position (\d+)/);
                if(errMatch) {
                    const pos = parseInt(errMatch[1]);
                    const textUntilError = input.substring(0, pos);
                    const line = textUntilError.split('\n').length;
                    output.innerHTML += `<br><small style="color:var(--text-muted)">Error near Line ${line}</small>`;
                }
            }
        }

        function minifyJSON() {
            const input = document.getElementById('jsonInput').value;
            try {
                document.getElementById('jsonOutput').innerText = JSON.stringify(JSON.parse(input));
            } catch(e) { showToast("Invalid JSON"); }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('jsonOutput').innerText);
            showToast("Copied!");
        }

        function downloadJSON() {
            const text = document.getElementById('jsonOutput').innerText;
            const blob = new Blob([text], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "velox_data.json";
            a.click();
        }

        function syntaxHighlight(json) {
            json = JSON.stringify(json, undefined, 2);
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'key';
                    else cls = 'string';
                } else if (/true|false/.test(match)) cls = 'boolean';
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // --- 3. PRO FEATURES IMPLEMENTATION ---
        function gatekeeper(feature) {
            if (AppState.isPro) {
                executePro(feature);
            } else {
                openPaymentModal();
            }
        }

        function executePro(feature) {
            const input = document.getElementById('jsonInput').value;
            if(!input) return showToast("Enter JSON first");

            if (feature === 'Bulk Engine') {
                // Web Worker Simulation
                const workerCode = `
                    self.onmessage = function(e) {
                        const data = e.data;
                        let progress = 0;
                        const interval = setInterval(() => {
                            progress += 20;
                            self.postMessage(progress);
                            if(progress >= 100) {
                                clearInterval(interval);
                                self.postMessage("Complete");
                            }
                        }, 500);
                    }
                `;
                const worker = new Worker(URL.createObjectURL(new Blob([workerCode], {type: "text/javascript"})));
                worker.onmessage = (e) => {
                    if(e.data === "Complete") showToast("✅ Bulk Process Complete");
                    else showToast(`⚡ Processing: ${e.data}%`);
                };
                worker.postMessage(input);
            } 
            else if (feature === 'AI Debugger') {
                showToast("🤖 AI Analyzing Structure...");
                setTimeout(() => alert("🤖 VELOX AI Suggestion:\n\n- Detected 2 nested arrays.\n- Key 'id' could be indexed for speed.\n- Structure is valid but can be optimized."), 1000);
            }
            else if (feature === 'Analytical Export') {
                // Export SQL Logic
                const obj = JSON.parse(input);
                const keys = Object.keys(obj);
                const vals = Object.values(obj).map(v => `'${v}'`).join(', ');
                const sql = `INSERT INTO table (${keys.join(',')}) VALUES (${vals});`;
                navigator.clipboard.writeText(sql);
                showToast("📊 SQL Export Copied");
            }
            else if (feature === 'Schema Gen') {
                const obj = JSON.parse(input);
                const schema = {};
                for (let key in obj) {
                    const type = typeof obj[key];
                    schema[key] = { type: type === 'number' ? 'integer' : (type === 'boolean' ? 'boolean' : 'string') };
                }
                document.getElementById('jsonOutput').innerText = JSON.stringify(schema, null, 2);
                showToast("🛠️ Schema Generated");
            }
            else {
                showToast(`👑 ${feature} Activated`);
            }
        }

        // --- 4. PAYMENT & ACTIVATION ---
        function openPaymentModal() {
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function verifyPayment() {
            const tx = document.getElementById('txHash').value;
            if(!tx) return showToast("Enter TxID");

            setTimeout(() => {
                AppState.isPro = true;
                localStorage.setItem('velox_pro_v2', 'true');
                updateUI();
                closeModal();
                showToast("🎉 Payment Verified! PRO Activated.");
            }, 1500);
        }

        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
        }

        function updateUI() {
            if(AppState.isPro) {
                document.getElementById('proBadge').style.display = 'block';
                document.getElementById('desktopUpgrade').style.display = 'none';
                // Remove pro locks visually
                document.querySelectorAll('.btn-pro').forEach(b => b.style.border = '1px solid var(--success)');
            }
        }

        // --- MOBILE UI ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            
            if(tab === 'input') {
                document.getElementById('pane-input').classList.add('active');
                document.querySelector('.tab-btn:first-child').classList.add('active');
            } else {
                document.getElementById('pane-output').classList.add('active');
                document.querySelector('.tab-btn:last-child').classList.add('active');
            }
        }

        function toggleDrawer() {
            document.getElementById('mobileDrawer').classList.toggle('active');
        }

        function showToast(msg) {
            const div = document.createElement('div');
            div.style.cssText = `position:fixed; bottom:20px; right:20px; background:var(--accent-blue); color:white; padding:10px 20px; border-radius:8px; z-index:2000; font-size:12px; font-weight:600; animation: slideUp 0.3s;`;
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        window.onload = () => {
            updateUI();
            // Responsive Check
            if(window.innerWidth <= 768) document.getElementById('menuBtn').style.display = 'flex';
        };
    </script>
</body>
</html>
