<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AdamOS</title>
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .greeting { font-size: 2em; margin-bottom: 30px; }
        .input-box { background: #1e1f20; border-radius: 30px; padding: 15px 25px; width: 600px; display: flex; align-items: center; border: 1px solid #333; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 1em; margin-right: 10px; }
        .avatar { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: #8e44ad; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#131314; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; }
    </style>
</head>
<body>

<!-- شاشة الدخول الأولى -->
<div id="loginOverlay">
    <input type="text" id="nameInput" placeholder="ادخل اسمك للبدء..." style="width:200px; padding:10px; text-align:center;">
    <button onclick="setName()" style="margin-top:10px;">دخول</button>
</div>

<!-- الواجهة الرئيسية -->
<div class="avatar" id="userAvatar">?</div>
<div class="greeting" id="greetingText">مرحبًا، ماذا يدور في ذهنك؟</div>
<div class="input-box">
    <input type="text" id="userInput" placeholder="اسأل AdamOS...">
    <button onclick="executeAction()" style="background:none; border:none; color:#aaa; cursor:pointer;">➔</button>
</div>

<script>
    function setName() {
        let name = document.getElementById('nameInput').value;
        if(name) {
            localStorage.setItem('userName', name);
            applyUser(name);
            document.getElementById('loginOverlay').style.display = 'none';
        }
    }

    function applyUser(name) {
        document.getElementById('greetingText').innerText = 'مرحبًا "' + name + '"، ماذا يدور في ذهنك؟';
        document.getElementById('userAvatar').innerText = name.charAt(0).toUpperCase();
    }

    // التحقق واش المستخدم مسجل من قبل
    if(localStorage.getItem('userName')) {
        applyUser(localStorage.getItem('userName'));
        document.getElementById('loginOverlay').style.display = 'none';
    }

    function executeAction() { alert("جاري تنفيذ طلبك..."); }
</script>

</body>
</html>
