<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AdamOS</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #131314; color: #fff; font-family: sans-serif; }
        
        /* Sidebar */
        .sidebar { width: 80px; background: #131314; display: flex; flex-direction: column; align-items: center; padding: 20px 0; border-left: 1px solid #333; }
        .sidebar div { margin: 20px 0; cursor: pointer; font-size: 1.5em; opacity: 0.7; }
        .sidebar div:hover { opacity: 1; }
        .settings-avatar { margin-top: auto; }
        
        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Light Mode Classes */
        .light-mode { background: #f4f4f4; color: #333; }
        .light-mode .sidebar { background: #e0e0e0; }
    </style>
</head>
<body>

<div class="sidebar">
    <div onclick="newChat()">✍️</div>
    <div onclick="showHistory()">🔍</div>
    <div onclick="showApps()">▣</div>
    <div onclick="toggleMode()">🌓</div>
    <div class="settings-avatar" onclick="alert('Settings')">⚙️</div>
    <div onclick="logout()">🐉</div>
</div>

<div class="main">
    <h1 id="greetingText">مرحبًا، ماذا يدور في ذهنك؟</h1>
</div>

<script>
    function toggleMode() { document.body.classList.toggle('light-mode'); }
    
    function newChat() { alert("بدء محادثة جديدة..."); }
    function showHistory() { alert("عرض تاريخ المحادثات..."); }
    function logout() { localStorage.clear(); location.reload(); }
</script>

</body>
</html>
