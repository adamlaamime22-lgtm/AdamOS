<!DOCTYPE html>
<!-- 
  Velox AI - Professional Local AI Interface
  تم التصميم والتطوير بواسطة: Top Front-End Engineer (AI Assistant)
  التاريخ: 2023-2024
  الهدف: تطبيق ويب تفاعلي متكامل يعمل محلياً باستخدام Transformers.js
-->
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox AI | النظام الذكي المتقدم</title>
    
    <!-- 
      ========================================
      قسم التصميم (CSS3) - Glassmorphism UI
      ========================================
    -->
    <style>
        /* تعريف المتغيرات الأساسية للألوان والتأثيرات */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(25px);
            --primary-accent: #00f2ff;
            --secondary-accent: #7000ff;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --status-green: #00ff88;
            --status-orange: #ffaa00;
            --status-red: #ff3333;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        /* إعادة تعيين الأنماط الأساسية للصفحة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* خلفية الصفحة بتدرج لوني عميق */
        body {
            background: radial-gradient(circle at top left, #1a0b2e, #000000),
                        radial-gradient(circle at bottom right, #0f172a, #000000);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* الحاوية الرئيسية للتطبيق */
        #app-container {
            width: 95vw;
            height: 92vh;
            max-width: 1400px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* 
          ========================================
          الشريط الجانبي (Sidebar)
          ========================================
        */
        aside.sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.2);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .brand {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            background: linear-gradient(45deg, var(--primary-accent), var(--text-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .status-panel {
            margin-bottom: auto;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            margin-bottom: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 8px;
            background-color: var(--status-red); /* الافتراضي أحمر حتى التحميل */
            box-shadow: 0 0 10px var(--status-red);
            transition: all 0.3s ease;
        }

        .status-label {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .guest-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .guest-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .guest-id {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--primary-accent);
            word-break: break-all;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-control {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .btn-control:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-accent);
        }

        /* 
          ========================================
          منطقة المحادثة (Main Chat Area)
          ========================================
        */
        main.chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header.chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 16px;
            color: var(--text-muted);
        }

        .settings-trigger {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.3s;
        }

        .settings-trigger:hover {
            color: var(--text-main);
        }

        /* حاوية الرسائل */
        #messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* تخصيص شريط التمرير */
        #messages-container::-webkit-scrollbar {
            width: 6px;
        }
        #messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        /* تنسيق الرسائل */
        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
            position: relative;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end; /* تظهر لليمين في العربية */
            background: linear-gradient(135deg, var(--secondary-accent), #4a00e0);
            color: white;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(112, 0, 255, 0.3);
        }

        .message.ai {
            align-self: flex-start; /* تظهر لليسار في العربية */
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-bottom-right-radius: 4px;
        }

        /* مؤشر الكتابة (Typewriter Cursor) */
        .cursor::after {
            content: '▋';
            display: inline-block;
            vertical-align: bottom;
            animation: blink 1s step-start infinite;
            color: var(--primary-accent);
            font-size: 12px;
            margin-right: 2px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 
          ========================================
          منطقة الإدخال (Input Area)
          ========================================
        */
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: flex-end;
            gap: 15px;
            position: relative;
        }

        /* حاوية الميكروفون والتأثير البصري */
        .mic-container {
            position: relative;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-mic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            z-index: 2;
        }

        .btn-mic:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-mic.listening {
            background: var(--status-red);
            border-color: var(--status-red);
            animation: pulse 1.5s infinite;
        }

        /* تأثير النبض الصوتي */
        .mic-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--status-red);
            z-index: 1;
            opacity: 0;
        }

        .listening .mic-wave {
            animation: ripple 1.5s infinite cubic-bezier(0, 0.2, 0.8, 1);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 51, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }

        @keyframes ripple {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        /* حقل الإدخال */
        .input-wrapper {
            flex: 1;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        textarea#user-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 15px;
            padding-right: 45px; /* مساحة للزر */
            font-family: var(--font-main);
            font-size: 15px;
            resize: none;
            height: 50px;
            max-height: 150px;
            overflow-y: auto;
            border-radius: 12px;
        }

        textarea#user-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* زر الإرسال */
        .btn-send {
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            width: 35px;
            height: 35px;
            border: none;
            background: transparent;
            color: var(--primary-accent);
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-send:hover {
            background: rgba(0, 242, 255, 0.1);
        }

        .btn-send:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* مؤشر التحميل داخل زر الإرسال */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary-accent);
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 
          ========================================
          الإشعارات (Toast Notifications)
          ========================================
        */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease-out forwards;
            min-width: 300px;
        }

        .toast.error { border-right: 4px solid var(--status-red); }
        .toast.success { border-right: 4px solid var(--status-green); }
        .toast.info { border-right: 4px solid var(--status-orange); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* إخفاء العناصر على الشاشات الصغيرة */
        @media (max-width: 768px) {
            aside.sidebar {
                position: absolute;
                left: 0; /* في العربية نضعه لليسار ليكون دروvero */
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                background: rgba(10, 5, 20, 0.95);
            }
            aside.sidebar.active {
                transform: translateX(0);
            }
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <!-- حاوية الإشعارات -->
    <div id="toast-container"></div>

    <!-- التطبيق الرئيسي -->
    <div id="app-container">
        
        <!-- الشريط الجانبي: المعلومات والتحكم -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">Velox AI</div>
            
            <div class="status-panel">
                <div class="status-badge">
                    <span id="system-status-dot" class="status-dot"></span>
                    <span id="system-status-text" class="status-label">جاري التهيئة...</span>
                </div>
                
                <div class="guest-info">
                    <div class="guest-label">Guest ID</div>
                    <div id="guest-id-display" class="guest-id">Loading...</div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-control" id="btn-clear-db">مسح الذاكرة</button>
                <button class="btn-control" id="btn-export">تصدير سجل</button>
            </div>
        </aside>

        <!-- منطقة المحادثة -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-title">Velox Neural Interface</div>
                <button class="settings-trigger" id="btn-menu">☰</button>
            </header>

            <div id="messages-container">
                <!-- الرسائل ستظهر هنا ديناميكياً -->
                <div class="message ai">
                    نظام Velox AI جاهز. أقوم بتحميل نماذج الذكاء الاصطناعي محلياً. يرجى الانتظار حتى يتحول مؤشر الحالة إلى الأخضر.
                </div>
            </div>

            <div class="input-area">
                <!-- زر الميكروفون مع التأثيرات -->
                <div class="mic-container">
                    <div class="mic-wave"></div>
                    <button class="btn-mic" id="btn-mic" title="تسجيل صوتي">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                    </button>

                <!-- حقل الإدخال -->
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>

            </div>
        </main>

    <!-- 
      ========================================
      البرمجيات (ES6+ JavaScript)
      ========================================
    -->
    <script type="module">
        // استيراد مكتبة Transformers.js من CDN
        // نستخدم نسخة ES modules لتعمل مباشرة في المتصفح الحديث
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.14.0';

        // إعدادات بيئة العمل للمكتبة لمنع استخدام السيرفرات الخارجية المحظورة
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        /**
         * ==========================================
         * 1. إدارة قاعدة البيانات (IndexedDB Manager)
         * ==========================================
         */
        class DatabaseManager {
            constructor(dbName = 'VeloxDB', storeName = 'conversations') {
                this.dbName = dbName;
                this.storeName = storeName;
                this.db = null;
            }

            // تهيئة قاعدة البيانات
            async initDatabase() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, 1);

                    // حدث الترقية أو الإنشاء الأولي
                    request.onupgradeneeded = (event) => {
                        this.db = event.target.result;
                        // إنشاء مخزن الكائنات (Object Store) إذا لم يكن موجوداً
                        if (!this.db.objectStoreNames.contains(this.storeName)) {
                            const store = this.db.createObjectStore(this.storeName, { keyPath: 'id', autoIncrement: true });
                            store.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                        // إنشاء مخزن لإعدادات المستخدم (مثل Guest ID)
                        if (!this.db.objectStoreNames.contains('settings')) {
                            this.db.createObjectStore('settings', { keyPath: 'key' });
                        }
                    };

                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        console.log("تم تهيئة قاعدة البيانات بنجاح");
                        resolve(this.db);
                    };

                    request.onerror = (event) => {
                        console.error("فشل تهيئة قاعدة البيانات:", event);
                        reject("Database Error");
                    };
                });
            }

            // توليد أو استرجاع Guest ID
            async getIdentity() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['settings'], 'readwrite');
                    const store = transaction.objectStore('settings');
                    const request = store.get('guest_id');

                    request.onsuccess = () => {
                        if (request.result) {
                            resolve(request.result.value);
                        } else {
                            // توليد ID جديد وحفظه
                            const newId = 'GUEST-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                            const addRequest = store.add({ key: 'guest_id', value: newId });
                            addRequest.onsuccess = () => resolve(newId);
                            addRequest.onerror = () => reject('Failed to save ID');
                        }
                    };
                });
            }

            // حفظ محادثة
            async persistConversation(role, content) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const message = {
                        role: role, // 'user' or 'ai'
                        content: content,
                        timestamp: new Date().getTime()
                    };
                    const request = store.add(message);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject('Failed to save message');
                });
            }

            // مسح قاعدة البيانات
            async clearDatabase() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.clear();
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject('Failed to clear DB');
                });
            }
        }

        /**
         * ==========================================
         * 2. محرك البحث المحلي (Knowledge Search Engine)
         * ==========================================
         */
        class KnowledgeSearchEngine {
            constructor() {
                // قاعدة معرفة افتراضية (محاكاة لملف knowledge_base.txt)
                this.knowledgeBase = `
                    Velox AI هو نظام ذكاء اصطناعي متقدم يعمل محلياً.
                    طوره آدم لغرض التحليل والعم التقني.
                    النظام يستخدم نموذج LaMini-Flan-T5-248M للمعالجة.
                    المعالجة تتم بالكامل داخل المتصفح لضمان الخصوصية.
                    النظام يدعم الكلام المكتوب والصوتي عبر Web Speech API.
                    لا يستخدم النظام إيموجي في الردود للحفاظ على الطابع التقني.
                    الأجوبة تكون مختصرة وتحليلية.
                `;
            }

            // استخراج الكلمات المفتاحية من السؤال
            extractKeywords(text) {
                // إزالة كلمات الوقف العربية البسيطة وتقسيم النص
                const stopWords = ['ما', 'هو', 'هي', 'كيف', 'لماذا', 'من', 'في', 'على', 'هل'];
                const words = text.split(/\s+/).map(w => w.replace(/[^\u0600-\u06FFa-zA-Z0-9]/g, ''));
                return words.filter(w => w.length > 2 && !stopWords.includes(w));
            }

            // البحث في قاعدة المعرفة
            searchContext(query) {
                const keywords = this.extractKeywords(query);
                if (keywords.length === 0) return ""; // لا سياق إضافي

                // البحث عن الجمل التي تحتوي على أحد الكلمات المفتاحية
                const sentences = this.knowledgeBase.split('.').filter(s => s.trim().length > 0);
                const relevantSentences = sentences.filter(sentence => {
                    return keywords.some(keyword => sentence.includes(keyword));
                });

                if (relevantSentences.length > 0) {
                    return `\n\n[System Context Info: ${relevantSentences.join('. ')}]`;
                }
                return "";
            }
        }

        /**
         * ==========================================
         * 3. المنطق الرئيسي للنظام (Velox AI Core)
         * ==========================================
         */
        class VeloxAI {
            constructor() {
                this.dbManager = new DatabaseManager();
                this.ragEngine = new KnowledgeSearchEngine();
                this.generator = null; // كائن النموذج
                this.isModelReady = false;
                this.guestId = null;

                // ثوابت النظام
                this.SYSTEM_PROMPT = "أنت Velox AI، مساعد تقني ابتكره آدم لعميم. إجاباتك تحليلية، تقنية، مختصرة (3 أسطر)، ممنوع منعاً كلياً استخدام الإيموجي أو التعبير غير الرسمي.";
                this.MODEL_NAME = 'Xenova/LaMini-Flan-T5-248M';
                
                this.ui = {
                    statusDot: document.getElementById('system-status-dot'),
                    statusText: document.getElementById('system-status-text'),
                    guestId: document.getElementById('guest-id-display'),
                    input: document.getElementById('user-input'),
                    sendBtn: document.getElementById('btn-send'),
                    micBtn: document.getElementById('btn-mic'),
                    messages: document.getElementById('messages-container'),
                    spinner: document.getElementById('loading-spinner'),
                    sendIcon: document.getElementById('send-icon'),
                    toastContainer: document.getElementById('toast-container')
                };

                this.init();
            }

            // نقطة البداية
            async init() {
                try {
                    // 1. تهيئة قاعدة البيانات
                    await this.dbManager.initDatabase();
                    this.guestId = await this.dbManager.getIdentity();
                    this.ui.guestId.textContent = this.guestId;

                    // 2. تحميل النموذج مع نظام الاستشفاء الذاتي
                    await this.loadModelWithRetry(5);

                    // 3. تفعيل واجهة المستخدم
                    this.setupEventListeners();
                    this.updateStatus('ready');
                    this.showToast('تم تفعيل النظام بنجاح', 'success');

                } catch (error) {
                    console.error("Critical Init Error:", error);
                    this.updateStatus('error');
                    this.showToast('فشل تشغيل النظام: ' + error.message, 'error');
                }
            }

            // نظام الاستشفاء الذاتي (Auto-Recovery)
            async loadModelWithRetry(attempts) {
                this.updateStatus('loading');
                
                for (let i = 0; i < attempts; i++) {
                    try {
                        console.log(`محاولة تحميل الموديل (${i + 1}/${attempts})...`);
                        
                        // تحميل النموذج عبر Transformers.js
                        // نستخدم pipeline 'text2text-generation'
                        this.generator = await pipeline('text2text-generation', this.MODEL_NAME, {
                            progress_callback: (data) => {
                                // يمكن إضافة شريط تقدم هنا إذا لزم الأمر
                                if (data.status === 'progress') {
                                    this.ui.statusText.textContent = `تحميل النموذج: ${Math.round(data.progress)}%`;
                                }
                            }
                        });

                        this.isModelReady = true;
                        return; // نجاح التحميل

                    } catch (error) {
                        console.error(`محاولة ${i + 1} فشلت:`, error);
                        
                        if (i === attempts - 1) {
                            throw new Error("تعذر تحميل النموذج بعد عدة محاولات. تحقق من الاتصال بالإنترنت للتحميل الأولي.");
                        }

                        // Exponential Backoff: انتظار متزايد
                        const waitTime = Math.pow(2, i) * 1000 + 3000; // 3s, 5s, 9s...
                        this.showToast(`فشل الاتصال، إعادة المحاولة خلال ${waitTime/1000} ثانية...`, 'info');
                        await new Promise(resolve => setTimeout(resolve, waitTime));
                    }
                }
            }

            // توليد الرد (Inference)
            async generateResponse(userText) {
                if (!this.isModelReady) throw new Error("النموذج غير جاهز بعد");

                // 1. تحليل النية (Logical Reasoning Layer Simulation) + البحث المحلي
                const ragContext = this.ragEngine.searchContext(userText);
                const finalPrompt = `${this.SYSTEM_PROMPT} \n User: ${userText} ${ragContext}`;

                // 2. تشغيل الاستنتاج
                const output = await this.generator(finalPrompt, {
                    max_new_tokens: 200, // تقييد طول الرد
                    temperature: 0.7,
                    do_sample: true
                });

                return output[0].generated_text;
            }

            // معالجة الإرسال
            async handleSend() {
                const text = this.ui.input.value.trim();
                if (!text) return;

                // UI Updates
                this.ui.input.value = '';
                this.ui.input.style.height = '50px'; // إعادة تعيين الارتفاع
                this.setLoading(true);
                this.addMessage('user', text);
                await this.dbManager.persistConversation('user', text);

                try {
                    // تشغيل الذكاء الاصطناعي
                    const response = await this.generateResponse(text);
                    
                    // تنظيف الرد (مثلاً إزال System Prompt echo إذا حدث)
                    let cleanResponse = response.replace(this.SYSTEM_PROMPT, '').trim();
                    
                    // الكتابة التلقائية
                    await this.typewriterEffect(cleanResponse);
                    await this.dbManager.persistConversation('ai', cleanResponse);

                } catch (error) {
                    console.error("Inference Error:", error);
                    this.showToast('حدث خطأ أثناء المعالجة', 'error');
                    this.addMessage('ai', 'عذراً، حدث خلل تقني في محرك المعالجة.');
                } finally {
                    this.setLoading(false);
                }
            }

            // تأثير الكتابة (Typewriter Effect)
            typewriterEffect(text) {
                return new Promise((resolve) => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message ai cursor';
                    this.ui.messages.appendChild(msgDiv);
                    
                    let i = 0;
                    const speed = 30; // سرعة الكتابة

                    const type = () => {
                        if (i < text.length) {
                            msgDiv.textContent += text.charAt(i);
                            i++;
                            this.scrollToBottom();
                            setTimeout(type, speed);
                        } else {
                            msgDiv.classList.remove('cursor'); // إزالة مؤشر الكتابة
                            resolve();
                        }
                    };
                    type();
                });
            }

            // إضافة رسالة فورية للشاشة
            addMessage(role, text) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${role}`;
                msgDiv.textContent = text;
                this.ui.messages.appendChild(msgDiv);
                this.scrollToBottom();
            }

            // حالة التحميل
            setLoading(isLoading) {
                this.ui.sendBtn.disabled = isLoading;
                if (isLoading) {
                    this.ui.spinner.style.display = 'block';
                    this.ui.sendIcon.style.display = 'none';
                } else {
                    this.ui.spinner.style.display = 'none';
                    this.ui.sendIcon.style.display = 'block';
                }
            }

            // تحديث حالة النظام
            updateStatus(state) {
                const { statusDot, statusText } = this.ui;
                switch (state) {
                    case 'loading':
                        statusDot.style.backgroundColor = 'var(--status-orange)';
                        statusDot.style.boxShadow = '0 0 10px var(--status-orange)';
                        statusText.textContent = 'تحميل النموذج...';
                        break;
                    case 'ready':
                        statusDot.style.backgroundColor = 'var(--status-green)';
                        statusDot.style.boxShadow = '0 0 10px var(--status-green)';
                        statusText.textContent = 'متصل (Local)';
                        break;
                    case 'error':
                        statusDot.style.backgroundColor = 'var(--status-red)';
                        statusDot.style.boxShadow = '0 0 10px var(--status-red)';
                        statusText.textContent = 'خطأ في النظام';
                        break;
                }
            }

            // التمرير للأسفل
            scrollToBottom() {
                this.ui.messages.scrollTop = this.ui.messages.scrollHeight;
            }

            // إظهار إشعار
            showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                this.ui.toastContainer.appendChild(toast);
                
                // إزالة الإشعار بعد 3 ثواني
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(-20px)';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }

            // إعداد المستمعين (Event Listeners)
            setupEventListeners() {
                // زر الإرسال
                this.ui.sendBtn.addEventListener('click', () => this.handleSend());

                // Enter للإرسال (Shift+Enter لسطر جديد)
                this.ui.input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (this.isModelReady && !this.ui.sendBtn.disabled) {
                            this.handleSend();
                        }
                    }
                });

                // تكبير حقل الإدخال تلقائياً
                this.ui.input.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight) + 'px';
                    if (this.value.trim().length > 0) {
                        document.getElementById('btn-send').disabled = false;
                    } else {
                        document.getElementById('btn-send').disabled = true;
                    }
                });

                // زر الميكروفون (Web Speech API)
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    const recognition = new SpeechRecognition();
                    recognition.lang = 'ar-SA';
                    recognition.continuous = false;
                    recognition.interimResults = false;

                    recognition.onstart = () => {
                        this.ui.micBtn.classList.add('listening');
                        this.showToast('جاري الاستماع...', 'info');
                    };

                    recognition.onend = () => {
                        this.ui.micBtn.classList.remove('listening');
                    };

                    recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        this.ui.input.value += transcript;
                        this.ui.input.dispatchEvent(new Event('input'));
                    };

                    recognition.onerror = (event) => {
                        console.error("Speech Error:", event.error);
                        this.ui.micBtn.classList.remove('listening');
                        this.showToast('فشل التعرف على الصوت', 'error');
                    };

                    this.ui.micBtn.addEventListener('click', () => {
                        try {
                            recognition.start();
                        } catch (e) {
                            recognition.stop();
                        }
                    });
                } else {
                    this.ui.micBtn.style.display = 'none';
                    this.showToast('المتصفح لا يدعم تحويل الصوت لنص', 'error');
                }

                // زر مسح الذاكرة
                document.getElementById('btn-clear-db').addEventListener('click', async () => {
                    if(confirm('هل أنت متأكد من مسح سجل المحادثات؟')) {
                        await this.dbManager.clearDatabase();
                        this.ui.messages.innerHTML = '<div class="message ai">تم مسح الذاكرة. بدء جلسة جديدة.</div>';
                        this.showToast('تم مسح البيانات بنجاح', 'success');
                    }
                });

                // زر القائمة للشاشات الصغيرة
                document.getElementById('btn-menu').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('active');
                });
            }
        }

        // تشغيل التطبيق عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            const app = new VeloxAI();
        });

    </script>
</body>
</html>
