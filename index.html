<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VELOX Interface</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background-color: #131314; color: #e3e3e3; font-family: 'Segoe UI', sans-serif; }

        /* Main Area (اليسار) */
        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .welcome-text { font-size: 2.2em; font-weight: 500; margin-bottom: 40px; color: #c4c7c5; }
        .input-container { width: 700px; background: #1e1f20; padding: 15px; border-radius: 30px; display: flex; align-items: center; }
        input { flex: 1; background: none; border: none; color: white; padding: 10px; outline: none; font-size: 1.1em; text-align: right; }
        .send-btn { background: #8e8e8e; color: #131314; border: none; padding: 10px 20px; border-radius: 50%; cursor: pointer; }

        /* Sidebar (اليمين) */
        .sidebar { width: 280px; background: #131314; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .logo { font-size: 1.5em; font-weight: bold; margin-bottom: 20px; }
        .new-chat { background: #1e1f20; padding: 15px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="welcome-text">مرحباً بك في VELOX</div>
    <div class="input-container">
        <input type="text" placeholder="اكتب سؤالك لـ VELOX...">
        <div class="send-btn">➔</div>
    </div>
</div>

<div class="sidebar">
    <div class="logo">VELOX</div>
    <div class="new-chat">+ محادثة جديدة</div>
</div>

</body>
</html>
