<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AdamOS</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0d0d0d; color: #fff; font-family: sans-serif; transition: 0.3s; }
        
        /* Sidebar (اليسار) */
        .sidebar { width: 320px; background: #0d0d0d; border-left: 1px solid #333; display: flex; flex-direction: column; padding: 20px; }
        .title { color: #00ff9d; font-size: 1.4em; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .toggle-btn { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; background: linear-gradient(to right, #000 50%, #fff 50%); border: 1px solid #fff; }
        .new-chat { border: 1px solid #00ff9d; color: #00ff9d; padding: 10px; border-radius: 5px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        .chat-item { background: #1a1a1a; padding: 15px; border-radius: 5px; border: 1px solid #333; color: #fff; }

        /* Main (اليمين) */
        .main-area { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; }
        .user-badge { background: #00ff9d; color: #000; padding: 15px 30px; border-radius: 10px; align-self: flex-end; font-weight: bold; }
        .bottom-input { position: absolute; bottom: 20px; width: 95%; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; display: flex; align-items: center; }
        
        /* شاشة الدخول */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0d0d0d; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:1000; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <input type="text" id="nameInput" placeholder="ادخل اسمك..." style="padding:15px; border-radius:10px; width:200px; outline:none;">
    <button onclick="saveName()" style="margin-top:10px; padding:10px 20px; cursor:pointer; background:#00ff9d; border:none; border-radius:5px; font-weight:bold;">دخول</button>
</div>

<div class="sidebar">
    <div class="title">
        <div class="toggle-btn" onclick="toggleTheme()"></div>
        ADAMOS ◰ 
    </div>
    <div class="new-chat">+ محادثة جديدة</div>
    <div class="chat-item">AdamOS</div>
</div>

<div class="main-area">
    <div class="user-badge" id="displayName"></div>
    <div class="bottom-input">
        <input type="text" placeholder="اسأل AdamOS..." style="flex:1; background:none; border:none; color:white; outline:none; text-align:right; margin-left:10px;">
        <div style="background:#00ff9d; padding:10px; border-radius:5px; cursor:pointer; color:black;">➔</div>
    </div>
</div>

<script>
    function saveName() {
        let name = document.getElementById('nameInput').value;
        if(name) {
            localStorage.setItem('userName', name);
            showApp(name);
        }
    }

    function showApp(name) {
        document.getElementById('displayName').innerText = name;
        document.getElementById('loginOverlay').style.display = 'none';
    }

    const savedName = localStorage.getItem('userName');
    if(savedName) {
        showApp(savedName);
    }

    function toggleTheme() { document.body.style.filter = document.body.style.filter ? '' : 'invert(1)'; }
</script>

</body>
</html>
