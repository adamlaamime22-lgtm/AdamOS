<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AdamOS</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #131314; color: #e3e3e3; font-family: sans-serif; }
        
        /* Sidebar Icons Container */
        .sidebar { width: 80px; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .sidebar svg { width: 24px; height: 24px; fill: #e3e3e3; margin: 25px 0; cursor: pointer; opacity: 0.7; }
        .sidebar svg:hover { opacity: 1; }
        
        /* Main Area */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .greeting { font-size: 1.8em; margin-bottom: 20px; }
        .search-box { background: #1e1f20; border-radius: 30px; padding: 15px 25px; width: 600px; display: flex; align-items: center; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 1em; margin-right: 10px; }
        
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#131314; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <input type="text" id="nameInput" placeholder="ادخل اسمك..." style="padding:10px; border-radius:10px; border:none; text-align:center;">
    <button onclick="saveName()" style="margin-top:10px; cursor:pointer;">دخول</button>
</div>

<div class="sidebar">
    <!-- أيقونات Gemini الأصلية -->
    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm2 2v12h12V6H6z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
    <svg style="margin-top:auto;" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.62l-1.92-3.33c-.12-.22-.38-.3-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.44.17-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.48 0-.59.22L2.74 8.87c-.12.21-.08.47.12.62l2.03 1.58c-.04.3-.06.65-.06.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.62l1.92 3.33c.12.22.38.3.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.04.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.48 0 .59-.22l1.92-3.33c.12-.22.07-.47-.12-.62l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3z"/></svg>
</div>

<div class="main">
    <h1 class="greeting" id="greetingText">مرحبًا، ماذا يدور في ذهنك؟</h1>
    <div class="search-box">
        <input type="text" placeholder="اسأل Gemini...">
        <div style="cursor:pointer;">➔</div>
    </div>
</div>

<script>
    function saveName() {
        let name = document.getElementById('nameInput').value;
        if(name) {
            localStorage.setItem('userName', name);
            applyName(name);
            document.getElementById('loginOverlay').style.display = 'none';
        }
    }

    function applyName(name) {
        document.getElementById('greetingText').innerText = 'ما الخطوات التالية، "' + name + '"؟';
    }

    if(localStorage.getItem('userName')) {
        applyName(localStorage.getItem('userName'));
        document.getElementById('loginOverlay').style.display = 'none';
    }
</script>

</body>
</html>
