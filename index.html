<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox AI - المحادثة الذكية</title>
    <!-- استيراد خط Tajawal لمظهر عربي احترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- استيراد مكتبة أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           1. متغيرات الألوان والتصميم (CSS Variables)
           ========================================= */
        :root {
            --bg-color: #0f0f13;
            --sidebar-bg: rgba(30, 30, 35, 0.6);
            --chat-bg: rgba(20, 20, 25, 0.4);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --accent-color: #7c4dff; /* لون بنفسجي أنيق */
            --accent-glow: rgba(124, 77, 255, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --msg-user-bg: rgba(124, 77, 255, 0.2);
            --msg-ai-bg: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.08);
            --font-main: 'Tajawal', sans-serif;
            --sidebar-width: 250px;
        }

        /* =========================================
           2. التنسيقات الأساسية (Reset & Base)
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            /* خلفية متدرجة لإظهار تأثير الزجاج */
            background-image: radial-gradient(circle at 10% 20%, rgba(30, 20, 50, 1) 0%, rgba(10, 10, 15, 1) 90%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* شريط التمرير المخصص */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        /* =========================================
           3. القائمة الجانبية (Sidebar)
           ========================================= */
        aside {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-left: var(--glass-border);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: var(--glass-border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-history {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: transparent;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .history-item.active {
            background: rgba(124, 77, 255, 0.15);
            border-color: var(--accent-color);
            color: #fff;
        }

        .sidebar-footer {
            padding: 15px;
            border-top: var(--glass-border);
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00e676;
            border-radius: 50%;
            box-shadow: 0 0 5px #00e676;
        }

        /* =========================================
           4. منطقة المحادثة الرئيسية (Main Chat)
           ========================================= */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            border-bottom: var(--glass-border);
        }

        .model-badge {
            font-size: 0.8rem;
            padding: 5px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* حاوية الرسائل */
        .messages-container {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            align-items: flex-start;
            max-width: 80%;
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end; /* لليمين في RTL */
            flex-direction: row-reverse;
        }

        .message.ai {
            align-self: flex-start; /* لليسار في RTL */
            flex-direction: row;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 12px;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .user .avatar {
            background: var(--accent-color);
            color: white;
        }

        .ai .avatar {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
        }

        .user .bubble {
            background: var(--msg-user-bg);
            border: 1px solid rgba(124, 77, 255, 0.3);
            border-top-right-radius: 2px; /* حافة حادة */
        }

        .ai .bubble {
            background: var(--msg-ai-bg);
            border: var(--glass-border);
            border-top-left-radius: 2px; /* حافة حادة */
        }

        .error-msg {
            color: #ff5252;
            background: rgba(255, 82, 82, 0.1) !important;
            border-color: rgba(255, 82, 82, 0.3) !important;
        }

        /* مؤشر الكتابة */
        .typing-indicator {
            display: none;
            gap: 5px;
            padding: 15px 20px;
            background: var(--msg-ai-bg);
            border-radius: 12px;
            width: fit-content;
            margin-left: 50px; /* مسافة للأفاتار */
            margin-bottom: 10px;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* =========================================
           5. منطقة الإدخال (Input Area)
           ========================================= */
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-top: var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-wrapper {
            flex-grow: 1;
            position: relative;
            background: var(--input-bg);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(124, 77, 255, 0.1);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            padding: 14px 45px 14px 15px; /* مساحة لأيقونة الميكروفون داخل الحقل */
            resize: none;
            height: 50px;
            font-family: var(--font-main);
            font-size: 1rem;
            max-height: 120px;
        }

        /* زر الميكروفون داخل حقل الإدخال */
        .mic-btn-inner {
            position: absolute;
            left: 10px; /* يسار الحقل لأن الاتجاه RTL */
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.3s;
            padding: 5px;
        }

        .mic-btn-inner:hover {
            color: white;
        }

        /* تأثير توهج الميكروفون عند الاستماع */
        .mic-btn-inner.listening {
            color: var(--accent-color);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 0 0 rgba(124, 77, 255, 0.7); }
            70% { text-shadow: 0 0 0 10px rgba(124, 77, 255, 0); }
            100% { text-shadow: 0 0 0 0 rgba(124, 77, 255, 0); }
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--accent-color);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: #651fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        .send-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

    </style>
</head>
<body>

    <!-- =========================================
         واجهة المستخدم (HTML Structure)
         ========================================= -->

    <!-- القائمة الجانبية -->
    <aside>
        <div class="sidebar-header">
            <div class="logo">
                <i class="fa-solid fa-bolt"></i> Velox AI
            </div>
        </div>
        
        <div class="chat-history" id="chatHistory">
            <!-- سيتم ملؤها بواسطة JS -->
        </div>

        <div class="sidebar-footer">
            <div class="status-dot"></div>
            <span>Guest ID: <strong id="guestIdDisplay">...</strong></span>
        </div>
    </aside>

    <!-- منطقة المحادثة -->
    <main>
        <header class="chat-header">
            <h3 style="font-weight: 500;">محادثة جديدة</h3>
            <span class="model-badge"><i class="fa-solid fa-robot"></i> GPT-4 (Simulated)</span>
        </header>

        <div class="messages-container" id="messagesContainer">
            <!-- الرسائل ستظهر هنا -->
            <div class="message ai">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="bubble">
                    أهلاً بك في Velox AI. أنا مساعدك الذكي. كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>
        </div>

        <!-- مؤشر الكتابة -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
                <!-- زر الميكروفون -->
                <button class="mic-btn-inner" id="micBtn" title="تسجيل صوتي">
                    <i class="fa-solid fa-microphone"></i>
                </button>
            </div>
            <button class="send-btn" id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </main>

    <!-- =========================================
         المنطق البرمجي (JavaScript)
         ========================================= -->
    <script>
        // إعدادات الـ API Key (اتركه فارغاً لملئه يدوياً)
const API_KEY = 'أدخل_مفتاح_OpenAI_الخاص_بك_هنا';
        
        // الثوابت
        const LS_GUEST_ID_KEY = 'velox_guest_id';
        const LS_CHAT_HISTORY_KEY = 'velox_chat_history';
        const GPT_ENDPOINT = 'https://api.openai.com/v1/chat/completions'; // نقطة النهاية القياسية

        // عناصر الـ DOM
        const guestIdDisplay = document.getElementById('guestIdDisplay');
        const chatHistoryContainer = document.getElementById('chatHistory');
        const messagesContainer = document.getElementById('messagesContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        // متغيرات الحالة
        let guestId = '';
        let chatMessages = [];
        let isListening = false;
        let recognition = null;

        // =========================================
        // 1. التهيئة عند تحميل الصفحة (Initialization)
        // =========================================
        window.addEventListener('DOMContentLoaded', () => {
            initGuestIdentity();
            loadChatHistory();
            initSpeechRecognition();
            setupEventListeners();
        });

        /**
         * دالة لإنشاء أو استرجاع Guest ID
         */
        function initGuestIdentity() {
            let storedId = localStorage.getItem(LS_GUEST_ID_KEY);
            if (!storedId) {
                // توليد معرف فريد بسيط (UUID-like)
                storedId = 'guest_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
                localStorage.setItem(LS_GUEST_ID_KEY, storedId);
            }
            guestId = storedId;
            guestIdDisplay.textContent = guestId;
        }

        // =========================================
        // 2. إدارة المحادثات (Chat Management)
        // =========================================
        
        function loadChatHistory() {
            const storedHistory = localStorage.getItem(LS_CHAT_HISTORY_KEY);
            if (storedHistory) {
                try {
                    chatMessages = JSON.parse(storedHistory);
                    renderChatMessages();
                    renderSidebarHistory();
                } catch (e) {
                    console.error('فشل تحميل السجل:', e);
                }
            }
        }

        function saveChatMessage(role, content) {
            const message = {
                id: Date.now(),
                role: role, // 'user' or 'assistant'
                content: content,
                timestamp: new Date().toISOString()
            };
            chatMessages.push(message);
            localStorage.setItem(LS_CHAT_HISTORY_KEY, JSON.stringify(chatMessages));
            renderSidebarHistory();
        }

        function renderChatMessages() {
            // مسح الرسائل الحالية (عدا رسالة الترحيب إذا كانت القائمة فارغة)
            if (chatMessages.length > 0) {
                messagesContainer.innerHTML = '';
            }
            
            chatMessages.forEach(msg => {
                appendMessageToDOM(msg.role, msg.content, false);
            });
            scrollToBottom();
        }

        function renderSidebarHistory() {
            // في هذا الإصدار البسيط، سنعرض آخر 3 أسئلة في القائمة الجانبية
            // لجعلها تشبه جلسات، سنقوم بفلترة رسائل المستخدم فقط
            const userMessages = chatMessages.filter(m => m.role === 'user');
            
            chatHistoryContainer.innerHTML = '';
            
            // عرض الرسائل بالعكس (الأحدث أولاً)
            userMessages.slice().reverse().slice(0, 10).forEach(msg => {
                const div = document.createElement('div');
                div.className = 'history-item active'; // يمكن تغيير المنطق لتحديد الجلسة الحالية
                div.textContent = msg.content;
                div.title = msg.content; // تلميح عند التحويم
                // إضافة حدث النقر لاستعادة رسالة معينة (اختياري)
                chatHistoryContainer.appendChild(div);
            });
        }

        /**
         * إضافة رسالة للواجهة
         * @param {string} role - 'user' or 'ai'
         * @param {string} text - نص الرسالة
         * @param {boolean} save - هل يتم حفظها في التاريخ؟
         * @param {boolean} isError - هل هي رسالة خطأ؟
         */
        function appendMessageToDOM(role, text, save = true, isError = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const avatarIcon = role === 'user' ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-robot"></i>';
            
            let bubbleClass = 'bubble';
            if (isError) bubbleClass += ' error-msg';

            msgDiv.innerHTML = `
                <div class="avatar">${avatarIcon}</div>
                <div class="${bubbleClass}">${escapeHtml(text)}</div>
            `;
            
            messagesContainer.appendChild(msgDiv);
            
            if (save && !isError) {
                saveChatMessage(role, text);
            }
            
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // حماية بسيطة من XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        // =========================================
        // 3. التفاعل والـ API (Interaction & API)
        // =========================================

        function setupEventListeners() {
            // الإرسال عند الضغط على الزر
            sendBtn.addEventListener('click', handleSend);

            // الإرسال عند الضغط على Enter (بدون Shift)
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            // تكبير حقل النص تلقائياً
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                if(this.value === '') this.style.height = '50px';
            });
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. عرض رسالة المستخدم
            userInput.value = '';
            userInput.style.height = '50px';
            appendMessageToDOM('user', text);

            // 2. إظهار مؤشر الكتابة
            showTyping(true);

            try {
                let aiResponse = '';
                
                if (!API_KEY) {
                    // محاكاة رد إذا لم يكن هناك مفتاح API (لأغراض العرض)
                    await new Promise(r => setTimeout(r, 1500)); // تأخير اصطناعي
                    aiResponse = "لقد قمت بإرسال رسالة: \"" + text + "\".\n\nملاحظة: لم يتم توفير مفتاح API في الكود، لذا هذا رد محاكاة. يرجى إضافة مفتاح OpenAI في المتغير `API_KEY` لتفعيل الردود الفعلية.";
                } else {
                    // الاتصال الحقيقي بالـ API
                    aiResponse = await fetchAIResponse(text);
                }

                // 3. عرض رد المساعد
                showTyping(false);
                appendMessageToDOM('ai', aiResponse);

                // 4. نطق الرد (Text-to-Speech)
                speakText(aiResponse);

            } catch (error) {
                showTyping(false);
                console.error(error);
                appendMessageToDOM('ai', "عذراً، حدث خطأ أثناء الاتصال بالخادم. يرجى المحاولة لاحقاً.", false, true);
            }
        }

        /**
         * الاتصال بـ OpenAI API
         */
        async function fetchAIResponse(userMessage) {
            // تحضير الرسائل للسياق (الـ 5 رسائل الأخيرة فقط لتوفير الحقول)
            const contextMessages = chatMessages.slice(-6).map(m => ({
                role: m.role === 'ai' ? 'assistant' : 'user',
                content: m.content
            }));
            
            // إضافة الرسالة الحالية
            contextMessages.push({ role: 'user', content: userMessage });

            const response = await fetch(GPT_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo", // أو gpt-4 حسب الاشتراك
                    messages: contextMessages,
                    max_tokens: 500
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || 'فشل الاتصال');
            }

            const data = await response.json();
            return data.choices[0].message.content;
        }

        function showTyping(show) {
            typingIndicator.style.display = show ? 'flex' : 'none';
            if (show) scrollToBottom();
        }

        // =========================================
        // 4. الصوتيات (Web Speech API)
        // =========================================

        // 4.1 تحويل النص إلى كلام (Speech Synthesis)
        function speakText(text) {
            if (!window.speechSynthesis) return;
            
            // إلغاء أي نطق سابق
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA'; // محاولة ضبط اللغة العربية
            utterance.rate = 1; // سرعة طبيعية
            utterance.pitch = 1;

            // محاولة اختيار صوت عربي إذا توفر
            const voices = window.speechSynthesis.getVoices();
            const arabicVoice = voices.find(v => v.lang.includes('ar'));
            if (arabicVoice) utterance.voice = arabicVoice;

            window.speechSynthesis.speak(utterance);
        }

        // 4.2 تحويل الكلام إلى نص (Speech Recognition)
        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                
                recognition.continuous = false; // التوقف بعد الجملة الأولى
                recognition.lang = 'ar-SA'; // اللغة العربية
                recognition.interimResults = false;

                recognition.onstart = () => {
                    isListening = true;
                    micBtn.classList.add('listening');
                    userInput.placeholder = 'جاري الاستماع...';
                };

                recognition.onend = () => {
                    isListening = false;
                    micBtn.classList.remove('listening');
                    userInput.placeholder = 'اكتب رسالتك هنا...';
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    userInput.value = transcript;
                    // تفعيل زر الإرسال تلقائياً عند وجود نص
                    if(transcript.trim()) handleSend(); 
                };

                recognition.onerror = (event) => {
                    console.error('Speech API Error:', event.error);
                    isListening = false;
                    micBtn.classList.remove('listening');
                    userInput.placeholder = 'حدث خطأ في الميكروفون. حاول مرة أخرى.';
                };

                // ربط الزر بالوظيفة
                micBtn.addEventListener('click', () => {
                    if (isListening) {
                        recognition.stop();
                    } else {
                        recognition.start();
                    }
                });

            } else {
                // إخفاء زر الميكروفون إذا لم يدعم المتصفح الخدمة
                micBtn.style.display = 'none';
                console.warn('المتصفح لا يدعم Web Speech API');
            }
        }

    </script>
</body>
</html>
