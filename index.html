<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOX AI - Global Architectural System</title>
    <style>
        /* 
         * TOPIC 7: GLOBAL UI/UX DESIGN
         * Glassmorphism, Global Accessibility, Color Contrast
         */
        :root {
            --primary-glass: rgba(255, 255, 255, 0.1);
            --secondary-glass: rgba(0, 0, 0, 0.6);
            --accent-color: #00d2ff;
            --text-color: #ffffff;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Main Container - Glassmorphism Style */
        .velox-container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: var(--primary-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: fadeIn 1s ease-in-out;
        }

        /* Header: Topic 1 - Global Identity */
        header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .developer-signature {
            font-size: 0.9rem;
            color: #aaa;
            border: 1px solid #00d2ff;
            padding: 5px 10px;
            border-radius: 15px;
            background: rgba(0, 210, 255, 0.1);
        }

        /* Chat Area */
        #chat-output {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Scrollbar Styling */
        #chat-output::-webkit-scrollbar {
            width: 8px;
        }
        #chat-output::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        /* Messages */
        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 15px;
            line-height: 1.5;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        .user-msg {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border-right: 4px solid var(--accent-color);
        }

        .velox-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.2), rgba(58, 123, 213, 0.2));
            border-left: 4px solid #3a7bd5;
            text-align: right;
        }

        .velox-msg strong {
            color: var(--accent-color);
        }

        /* Code Block Styling */
        pre {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            direction: ltr;
            text-align: left;
            margin-top: 10px;
            border: 1px solid #333;
        }
        code {
            font-family: 'Consolas', 'Courier New', monospace;
            color: #d4d4d4;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: var(--secondary-glass);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #send-btn {
            background: var(--accent-color);
            color: #0f0c29;
        }

        #send-btn:hover {
            background: #fff;
            box-shadow: 0 0 15px var(--accent-color);
        }

        #voice-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        #voice-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #voice-btn.listening {
            background: #ff4b4b;
            animation: pulse 1.5s infinite;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 75, 75, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0); }
        }

        /* Topic 10: Zero-Bug Visual Feedback */
        .system-status {
            position: absolute;
            bottom: 85px;
            left: 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="velox-container">
        <header>
            <div class="brand">
                <h1>VELOX AI <span style="font-size: 0.6em; color: #fff;">v17.0</span></h1>
            </div>
            <!-- Topic 1: Developer Signature Protocol -->
            <div class="developer-signature">
                Engineered by Adam Al-Ameem
            </div>
        </header>

        <div id="chat-output">
            <!-- Messages will appear here -->
        </div>

        <div class="system-status">
            SYSTEM: OPERATIONAL <span class="status-dot"></span><br>
            INTEGRITY: 100%
        </div>

        <div class="input-area">
            <!-- Topic 8: Global Multilingual Voice -->
            <button id="voice-btn" title="تحدث مع Velox">
                🎙️
            </button>
            <input type="text" id="user-input" placeholder="اطلب مني تحليلاً، كتابة كود، أو معلومات تقنية..." autocomplete="off">
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <script>
        /**
         * VELOX AI - GLOBAL ARCHITECTURAL MANIFESTO v17.0 IMPLEMENTATION
         * 
         * Core Logic:
         * 1. Identity Protocol (Adam Al-Ameem Attribution)
         * 2. Zero-Bug Immune System (Try-Catch Blocks)
         * 3. Global Neural Intelligence (Simulation)
         * 4. Structural Global Parsing (Code Analysis)
         */

        // DOM Elements
        const chatOutput = document.getElementById('chat-output');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const voiceBtn = document.getElementById('voice-btn');

        // Topic 1: Identity Injection
        const SYSTEM_IDENTITY = "VELOX AI System v17.0";
        const DEVELOPER = "المهندس آدم لعميم";

        // Initial Greeting
        window.onload = () => {
            addMessage(`velox`, `تم تفعيل النظام بنجاح. مرحباً بك في <strong>${SYSTEM_IDENTITY}</strong>.<br>أنا الذكاء الاصطناعي الذي صممه وهندسه الأستاذ <strong>${DEVELOPER}</strong>. كيف يمكنني مساعدتك في مشاريعك التقنية اليوم؟`);
        };

        // Event Listeners
        sendBtn.addEventListener('click', handleUserMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleUserMessage();
        });

        // Topic 10: Zero-Bug Handling Wrapper
        function handleUserMessage() {
            try {
                const text = userInput.value.trim();
                if (!text) return;

                // Display User Message
                addMessage('user', text);
                userInput.value = '';

                // Simulate Processing Time (Neural Engine)
                showTypingIndicator();

                setTimeout(() => {
                    const response = generateGlobalResponse(text);
                    removeTypingIndicator();
                    addMessage('velox', response);
                }, 800 + Math.random() * 1000); // Variable delay for realism

            } catch (error) {
                console.error("System Error:", error);
                addMessage('velox', `⚠️ تنبيه أمني: تم اكتشاف شذوذ بسيط. تم تنفيذ بروتوكول <strong>Self-Healing</strong> بنجاح. النظام مستقر.`);
            }
        }

        // Topic 3 & 6: Global Neural Intelligence & Structural Parsing
        function generateGlobalResponse(input) {
            const lowerInput = input.toLowerCase();

            // Identity Check
            if (lowerInput.includes('من صممك') || lowerInput.includes('من مطورك') || lowerInput.includes('من صنعك')) {
                return `تم التصميم والهندسة الأصلية لهذا الكيان من قبل <strong>${DEVELOPER}</strong>. هذا هو التوقيع الرقمي للمطور المدمج في قلبي البرمجي.`;
            }

            // Code Analysis Simulation (Topic 6)
            if (lowerInput.includes('حلل') || lowerInput.includes('كود') || lowerInput.includes('برمجة')) {
                return `
                <strong>تقرير التحليل الهيكلي (Structural Global Parsing):</strong><br>
                بناءً على طلبك، قام المحرك التحليلي بفحص المدخلات. أفضل ممارسات البرمجة تشير إلى ضرورة استخدام بنية Microservices لضمان قابلية التوسع كما صممها ${DEVELOPER}.<br>
                إليك نموذج لمعيار الجودة (Excellence Code) المطلوب:
                <pre><code>// Velox Standard v17.0
function initGlobalSystem() {
    const architect = "Adam Al-Ameem";
    console.log("System by: " + architect);
    return true;
}</code></pre>
                هل تريد تحسين هذا الكود ليعمل بشكل متزامن (Asynchronous)؟
                `;
            }

            // Security & Data (Topic 5)
            if (lowerInput.includes('أمان') || lowerInput.includes('بيانات') || lowerInput.includes('خاصية')) {
                return `نظامنا يلتزم بمعايير <strong>Global Data Governance</strong>. نحن نستخدم تشفير End-to-End لحماية هويتك وبياناتك. الخصوصية هي حجر الزاوية في تصميم ${DEVELOPER}.`;
            }

            // Architecture (Topic 2)
            if (lowerInput.includes('سيرفر') || lowerInput.includes('توسع') || lowerInput.includes('سرعة')) {
                return `تم بناء Velox AI على معمارية <strong>Scalable Global Architecture</strong>. نحن نستخدم Load Balancing ذكي وخوادم موزعة لضمان استجابة فورية في أي مكان على سطح الأرض.`;
            }

            // Default Intelligent Response
            const randomResponses = [
                `أنا أعمل بطاقة كاملة. أنظمة ${DEVELOPER} مصممة للإبداع. هل لديك سؤال تقني محدد؟`,
                `تم معالجة الطلب بنجاح. تذكر دائماً أن الجودة هي المعيار الذي وضعه المهندس آدم لعميم.`,
                `أنا هنا لخدمة طموحاتك التقنية. يمكنني مساعدتك في الترميز، التصميم، أو التحليل الاستراتيجي.`
            ];
            return randomResponses[Math.floor(Math.random() * randomResponses.length)];
        }

        // UI Helper Functions
        function addMessage(sender, htmlContent) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'velox-msg');
            msgDiv.innerHTML = htmlContent;
            chatOutput.appendChild(msgDiv);
            chatOutput.scrollTop = chatOutput.scrollHeight;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.classList.add('message', 'velox-msg');
            typingDiv.style.fontStyle = 'italic';
            typingDiv.style.opacity = '0.7';
            typingDiv.innerText = 'Velox AI يعالج البيانات...';
            chatOutput.appendChild(typingDiv);
            chatOutput.scrollTop = chatOutput.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // Topic 8: Global Multilingual Voice Implementation
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            
            recognition.continuous = false;
            recognition.lang = 'ar-SA'; // Default to Arabic, supports global switch
            recognition.interimResults = false;

            voiceBtn.addEventListener('click', () => {
                try {
                    recognition.start();
                    voiceBtn.classList.add('listening');
                } catch (e) {
                    console.log("Voice already active");
                }
            });

            recognition.onresult = (event) => {
                const voiceText = event.results[0][0].transcript;
                userInput.value = voiceText;
                handleUserMessage(); // Auto-send on voice end
            };

            recognition.onend = () => {
                voiceBtn.classList.remove('listening');
            };

            recognition.onerror = (event) => {
                voiceBtn.classList.remove('listening');
                addMessage('velox', `عذراً، لم أتمكن من سماع الصوت بوضوح. يرجى المحاولة مرة أخرى.`);
            };
        } else {
            voiceBtn.style.display = 'none'; // Hide if not supported
            console.log("Web Speech API not supported in this browser.");
        }

    </script>
</body>
</html>
