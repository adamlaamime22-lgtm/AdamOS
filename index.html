<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox AI | Adam Laamime</title>
    
    <!-- 
        ========================================
        ARCHITECTURE: STYLE LAYER (style.css)
        ========================================
        تصميم Glassmorphism Pro UI مع هوية Deep Space
    -->
    <style>
        /* Typography & Base Variables */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap');

        :root {
            --bg-deep-space: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-color: #7b2cbf; /* Velvet Purple */
            --accent-glow: rgba(123, 44, 191, 0.4);
            --status-green: #00ff88;
            
            --font-main: 'Tajawal', 'Inter', sans-serif;
            --blur-strength: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- UI Utility: Glassmorphism Class --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-strength));
            -webkit-backdrop-filter: blur(var(--blur-strength));
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* --- 1. Initialization Screen --- */
        #init-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #050510;
            transition: opacity 0.8s ease-out;
        }

        .loader-content {
            text-align: center;
            width: 300px;
        }

        .velox-logo-loader {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            transition: width 0.2s linear;
        }

        .loading-text {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-family: monospace;
        }

        /* --- 2. Main Layout --- */
        #app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            width: 95vw;
            height: 92vh;
            border-radius: 24px;
            overflow: hidden;
            opacity: 0; /* Hidden until loaded */
            transform: scale(0.98);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        /* --- Sidebar --- */
        aside {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--glass-border);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand span { color: var(--accent-color); }

        .user-profile {
            padding: 1rem;
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .user-info h4 { font-size: 0.9rem; margin-bottom: 4px; }
        .user-info p { font-size: 0.75rem; color: var(--text-secondary); }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            padding: 4px 8px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 12px;
            color: var(--status-green);
            margin-top: 5px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--status-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--status-green);
            animation: blink 2s infinite;
        }

        .controls {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-glass {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .btn-glass:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-color: rgba(255,255,255,0.2);
        }

        .btn-glass.danger:hover {
            border-color: rgba(255, 99, 71, 0.5);
            color: #ff6347;
        }

        /* --- Chat Area --- */
        main {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .model-info {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .model-badge {
            background: rgba(123, 44, 191, 0.2);
            color: #b983ff;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        #chat-history {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        #chat-history::-webkit-scrollbar { width: 6px; }
        #chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
            animation: slideUp 0.4s ease-out;
        }

        .message.user {
            align-self: flex-start; /* RTL: Start is Right */
            background: rgba(123, 44, 191, 0.15);
            border: 1px solid rgba(123, 44, 191, 0.3);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .message.ai {
            align-self: flex-end; /* RTL: End is Left */
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: #eee;
        }

        .rag-source {
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- Input Area --- */
        .input-area {
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 50px 14px 20px; /* Space for icon */
            color: #fff;
            font-family: inherit;
            resize: none;
            height: 54px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        textarea:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(123, 44, 191, 0.15);
        }

        .action-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        
        .action-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .action-btn:active { transform: scale(0.95); }

        .send-btn {
            background: var(--accent-color);
            box-shadow: 0 4px 15px rgba(123, 44, 191, 0.4);
        }
        .send-btn:hover { background: #9d4edd; }

        .mic-active {
            color: #ff6347 !important;
            animation: pulse-red 1.5s infinite;
        }

        /* --- Toast Notification --- */
        #toast-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .toast {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeInDown 0.4s ease-out;
        }

        /* --- Animations --- */
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        @keyframes blink { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 99, 71, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 99, 71, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 99, 71, 0); } }

        /* Responsive */
        @media (max-width: 768px) {
            #app-container { grid-template-columns: 1fr; height: 100vh; width: 100vw; border-radius: 0; }
            aside { display: none; } /* Mobile Hide Sidebar for simplicity */
            .input-area { padding: 1rem; }
        }
    </style>
</head>
<body>

    <!-- 1. Initialization Screen -->
    <div id="init-screen">
        <div class="loader-content">
            <div class="velox-logo-loader">Velox AI</div>
            <div class="progress-container">
                <div class="progress-bar" id="loader-bar"></div>
            </div>
            <div class="loading-text" id="loading-status">جاري تهيئة النواة...</div>
        </div>
    </div>

    <!-- 2. Main App Container -->
    <div id="app-container" class="glass-panel">
        
        <!-- Sidebar -->
        <aside class="glass-panel" style="border-radius: 0;">
            <div class="brand">
                <span>◆</span> Velox AI
            </div>

            <div class="user-profile">
                <div class="avatar">Z</div>
                <div class="user-info">
                    <h4 id="guest-name">Guest User</h4>
                    <div class="status-badge">
                        <div class="status-dot"></div>
                        متصل
                    </div>
                    <p style="margin-top:5px; font-size:0.65rem; opacity:0.5;" id="guest-id-display">ID: ----</p>
                </div>
            </div>

            <div class="controls">
                <button class="btn-glass" id="btn-settings">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    الإعدادات
                </button>
                <button class="btn-glass danger" id="btn-clear">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    مسح المحادثة
                </button>
            </div>
        </aside>

        <!-- Main Chat Interface -->
        <main>
            <header>
                <div class="model-info">
                    LaMini-Flan-T5 <span class="model-badge">Local Engine</span>
                </div>
                <div style="font-size: 0.8rem; opacity: 0.6;">Velox v1.0.0</div>
            </header>

            <div id="chat-history">
                <!-- Welcome Message -->
                <div class="message ai">
                    مرحباً بك. أنا Velox AI، مساعدك الذكي الذي يعمل بتقنية المعالجة المحلية. كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>

            <div class="input-area">
                <button class="action-btn" id="btn-mic" title="تسجيل صوتي">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                </button>
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
                </div>
                <button class="action-btn send-btn" id="btn-send">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- 
        ========================================
        ARCHITECTURE: LOGIC LAYER (script.js)
        ========================================
    -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /**
             * Velox AI Core Logic
             * Developer: Adam Laamime
             * Architecture: Modular, Event-Driven, Zero-API Dependency
             */

            // --- Configuration & State ---
            const CONFIG = {
                identityString: "أنا Velox AI، ذكاء اصطناعي ذكي مطور من قبل المبرمج آدم لعميم (Adam Laamime).",
                modelName: "LaMini-Flan-T5",
                typingSpeed: 30
            };

            const state = {
                guestId: localStorage.getItem('velox_guest_id') || generateGuestId(),
                isProcessing: false,
                isRecording: false
            };

            // --- DOM Elements ---
            const elements = {
                loaderScreen: document.getElementById('init-screen'),
                loaderBar: document.getElementById('loader-bar'),
                loadingStatus: document.getElementById('loading-status'),
                appContainer: document.getElementById('app-container'),
                guestIdDisplay: document.getElementById('guest-id-display'),
                chatHistory: document.getElementById('chat-history'),
                userInput: document.getElementById('user-input'),
                btnSend: document.getElementById('btn-send'),
                btnMic: document.getElementById('btn-mic'),
                btnClear: document.getElementById('btn-clear'),
                btnSettings: document.getElementById('btn-settings'),
                toastContainer: document.getElementById('toast-container')
            };

            // --- Initialization Logic ---
            initSystem();

            function initSystem() {
                // Save ID if not exists
                if (!localStorage.getItem('velox_guest_id')) {
                    localStorage.setItem('velox_guest_id', state.guestId);
                }
                elements.guestIdDisplay.textContent = `ID: ${state.guestId}`;

                // Start Loading Simulation
                simulateLoading();
            }

            function simulateLoading() {
                let progress = 0;
                const stages = [
                    "جاري تهيئة النواة...",
                    "تحميل نموذج LaMini-Flan-T5...",
                    "ضبط مصفوفات الذاكرة...",
                    "بناء واجهة Glassmorphism...",
                    "النظام جاهز"
                ];

                const interval = setInterval(() => {
                    // Randomize progress increment for realism
                    progress += Math.floor(Math.random() * 5) + 1;
                    
                    if (progress > 100) progress = 100;
                    
                    elements.loaderBar.style.width = `${progress}%`;
                    
                    // Update text based on progress milestones
                    const stageIndex = Math.floor((progress / 100) * (stages.length - 1));
                    elements.loadingStatus.textContent = stages[stageIndex];

                    if (progress === 100) {
                        clearInterval(interval);
                        setTimeout(revealApp, 800);
                    }
                }, 50); // Speed of loading
            }

            function revealApp() {
                elements.loaderScreen.style.opacity = '0';
                elements.appContainer.style.opacity = '1';
                elements.appContainer.style.transform = 'scale(1)';
                
                setTimeout(() => {
                    elements.loaderScreen.style.display = 'none';
                    elements.userInput.focus();
                }, 800);
            }

            // --- Core Interaction Logic ---

            // 1. Send Message
            elements.btnSend.addEventListener('click', handleSendMessage);
            elements.userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });

            async function handleSendMessage() {
                const text = elements.userInput.value.trim();
                if (!text || state.isProcessing) return;

                // UI Update: Add User Message
                addMessage(text, 'user');
                elements.userInput.value = '';
                adjustTextareaHeight(elements.userInput);
                
                state.isProcessing = true;
                showTypingIndicator();

                try {
                    // Check Identity Constraint
                    if (isIdentityQuestion(text)) {
                        await simulateNetworkDelay(800);
                        removeTypingIndicator();
                        addMessage(CONFIG.identityString, 'ai');
                    } 
                    else {
                        // RAG Engine & Processing
                        const context = await performSearch(text);
                        await simulateNetworkDelay(1500); // Simulate inference time
                        
                        removeTypingIndicator();
                        
                        // Generate simulated response based on context
                        const response = generateAIResponse(text, context);
                        addMessage(response, 'ai', context.source);
                    }
                } catch (error) {
                    removeTypingIndicator();
                    showToast("حدث خطأ في المعالجة المحلية", "error");
                }

                state.isProcessing = false;
            }

            // 2. RAG Engine Simulation (Search Retrieval)
            async function performSearch(query) {
                // In a real scenario, this fetches from a vector DB.
                // Here we simulate finding context.
                console.log(`[RAG Engine]: Searching index for "${query}"...`);
                
                const dummyKnowledge = {
                    "default": "قمت بتحليل استفسارك بناءً على البيانات المتاحة في النظام المحلي.",
                    "velox": "Velox AI هو نظام ذكاء اصطناعي متقدم يعمل بمعالجة EDGE.",
                    "adam": "آدم لعميم هو المطور الرئيسي والمؤسس لهذا المشروع."
                };

                let match = dummyKnowledge["default"];
                let source = "Local Memory";

                const lowerQuery = query.toLowerCase();
                if (lowerQuery.includes("velox") || lowerQuery.includes("نظام")) {
                    match = dummyKnowledge["velox"];
                    source = "Internal Docs";
                } else if (lowerQuery.includes("آدم") || lowerQuery.includes("مطور")) {
                    match = dummyKnowledge["adam"];
                    source = "Profile DB";
                } else if (lowerQuery.includes("مرحبا") || lowerQuery.includes("هلو")) {
                    match = "أهلاً بك! كيف يمكنني تقديم الدعم التقني لك؟";
                    source = "Greeting Protocol";
                }

                return { text: match, source: source };
            }

            // 3. AI Response Generation (Simulated LLM)
            function generateAIResponse(query, context) {
                // Simple logic to construct a "smart" response
                const responses = [
                    `بناءً على ${context.source}، ${context.text} هل هناك تفاصيل أخرى تود معرفتها؟`,
                    `تم استرجاع المعلومات التالية من ${context.source}: ${context.text}`,
                    `حسب تحليلي: ${context.text}`
                ];
                
                // Pick random variation to feel dynamic
                return responses[Math.floor(Math.random() * responses.length)];
            }

            // 4. Identity Check Function
            function isIdentityQuestion(text) {
                const keywords = ["منصنعك", "من أنت", "من برمجك", "مصدر البرمجة", "من المطور"];
                return keywords.some(k => text.includes(k));
            }

            // --- UI Helper Functions ---

            function addMessage(text, type, source = null) {
                const div = document.createElement('div');
                div.className = `message ${type}`;
                
                // Markdown-ish parsing for bold (simple)
                let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                
                div.innerHTML = `
                    <div>${formattedText}</div>
                    ${source ? `<div class="rag-source"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> ${source}</div>` : ''}
                `;
                
                elements.chatHistory.appendChild(div);
                scrollToBottom();
            }

            function showTypingIndicator() {
                const div = document.createElement('div');
                div.className = 'message ai typing-indicator';
                div.id = 'typing-indicator';
                div.innerHTML = `
                    <span style="display:inline-block; animation:pulse 1s infinite">●</span>
                    <span style="display:inline-block; animation:pulse 1s infinite 0.2s">●</span>
                    <span style="display:inline-block; animation:pulse 1s infinite 0.4s">●</span>
                `;
                elements.chatHistory.appendChild(div);
                scrollToBottom();
            }

            function removeTypingIndicator() {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
            }

            function scrollToBottom() {
                elements.chatHistory.scrollTop = elements.chatHistory.scrollHeight;
            }

            // --- Sidebar Controls ---

            elements.btnClear.addEventListener('click', () => {
                if(confirm("هل أنت متأكد من مسح المحادثة؟")) {
                    elements.chatHistory.innerHTML = '';
                    addMessage("تم مسح الذاكرة المؤقتة. النظام جاهز.", 'ai');
                    showToast("تم مسح المحادثة بنجاح");
                }
            });

            elements.btnSettings.addEventListener('click', () => {
                showToast("لوحة الإعدادات قيد التطوير للإصدار 1.1");
            });

            // --- Microphone Simulation ---
            elements.btnMic.addEventListener('click', () => {
                if (state.isRecording) {
                    // Stop
                    state.isRecording = false;
                    elements.btnMic.classList.remove('mic-active');
                    showToast("تم إيقاف التسجيل");
                } else {
                    // Start
                    state.isRecording = true;
                    elements.btnMic.classList.add('mic-active');
                    showToast("جاري الاستماع...");
                    
                    // Simulate speech-to-text result
                    setTimeout(() => {
                        if(state.isRecording) {
                            elements.userInput.value += "هذا نص تجريبي من تحويل الصوت.";
                            state.isRecording = false;
                            elements.btnMic.classList.remove('mic-active');
                            adjustTextareaHeight(elements.userInput);
                        }
                    }, 3000);
                }
            });

            // --- Utilities ---

            function generateGuestId() {
                return 'G-' + Math.random().toString(36).substr(2, 9).toUpperCase();
            }

            function simulateNetworkDelay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                elements.toastContainer.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(-20px)';
                    setTimeout(() => toast.remove(), 400);
                }, 3000);
            }

            // Auto-resize textarea
            elements.userInput.addEventListener('input', function() {
                adjustTextareaHeight(this);
            });

            function adjustTextareaHeight(el) {
                el.style.height = '54px';
                el.style.height = (el.scrollHeight) + 'px';
                if(el.value === '') el.style.height = '54px';
            }
        });
    </script>
</body>
</html>
