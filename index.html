<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; height: 100vh; background-color: #0d0d0d; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; }

        /* الهيدر (اللوغو) */
        .header { text-align: left; padding: 20px; font-weight: bold; }

        /* المحتوى الرئيسي */
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .welcome { font-size: 2em; margin-bottom: 20px; }
        
        /* مربع الإدخال */
        .input-wrapper { width: 600px; background: #1a1a1a; padding: 15px; border-radius: 8px; display: flex; align-items: center; }
        .mic { margin-left: 10px; cursor: pointer; color: #aaa; }
        input { flex: 1; background: none; border: none; color: #fff; outline: none; }

        /* السايدبار (سجل المحادثات) */
        .sidebar { position: absolute; top: 80px; left: 20px; width: 200px; text-align: right; }
        .new-chat { border: 1px solid #333; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .history { font-size: 0.9em; color: #888; }
    </style>
</head>
<body>

    <div class="header">VELOX Logo</div>

    <div class="sidebar">
        <div class="new-chat">+ محادثة جديدة</div>
        <div class="history">
            سجل المحادثات:<br>
            • محادثة قديمة 1<br>
            • محادثة قديمة 2
        </div>
    </div>

    <div class="container">
        <div class="welcome">مرحباً بك في VELOX</div>
        <div class="input-wrapper">
            <span class="mic">🎤</span>
            <input type="text" placeholder="اكتب سؤالك لـ VELOX...">
        </div>
    </div>

</body>
</html>
