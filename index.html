<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { margin: 0; background: #0d0d0d; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Logo - الفوق */
        .header { width: 90%; padding: 20px; text-align: left; font-weight: bold; font-size: 1.2em; }
        
        /* Main - الوسط */
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .title { font-size: 2.5em; margin-bottom: 30px; }
        .box { width: 600px; background: #1a1a1a; padding: 15px; border-radius: 12px; display: flex; align-items: center; border: 1px solid #333; }
        
        /* Sidebar - اللي في اليمين */
        .sidebar { position: fixed; right: 20px; top: 80px; width: 250px; }
        .new-btn { background: #1a1a1a; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; cursor: pointer; text-align: center; }
        .history { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="header">VELOX Logo</div>

<div class="sidebar">
    <div class="new-btn">+ محادثة جديدة</div>
    <div class="history">
        سجل المحادثات:<br><br>
        • تصميم واجهة VELOX<br>
        • برمجة الذكاء الاصطناعي
    </div>
</div>

<div class="main">
    <div class="title">مرحباً بك في VELOX</div>
    <div class="box">
        <span style="margin-left: 10px; cursor: pointer;">🎤</span>
        <input type="text" placeholder="اكتب سؤالك..." style="width: 100%; background: none; border: none; color: white; outline: none;">
    </div>
</div>

</body>
</html>
