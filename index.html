<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Velox AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-5">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold mb-5 text-center">Velox AI - المخ الحقيقي</h1>
        <div id="chat-box" class="h-96 bg-gray-800 p-4 rounded-lg overflow-y-auto mb-4 border border-gray-700"></div>
        <div class="flex gap-2">
            <input id="user-input" type="text" class="flex-1 bg-gray-700 p-2 rounded" placeholder="اسأل Velox...">
            <button id="send-btn" class="bg-blue-600 px-4 py-2 rounded">إرسال</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');

        // هنا حط الـ API KEY ديالك (ضروري)
        const API_KEY = "sk-..."; 

        async function sendMessage() {
            const text = input.value;
            if (!text) return;

            chatBox.innerHTML += `<div class="mb-2 text-right"><b>أنت:</b> ${text}</div>`;
            input.value = '';

            try {
                const res = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{role: "user", content: text}]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                chatBox.innerHTML += `<div class="mb-2 text-left bg-gray-700 p-2 rounded"><b>Velox AI:</b> ${reply}</div>`;
            } catch (e) {
                chatBox.innerHTML += `<div class="text-red-500">خطأ: تأكد من الـ API Key</div>`;
            }
        }

        btn.onclick = sendMessage;
    </script>
</body>
</html>
