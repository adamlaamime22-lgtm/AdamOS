<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox AI v3.0 | Absolute Sigma Protocol</title>
    <style>
        /* 
         * VELOX AI v3.0 - UI SYSTEM DESIGN
         * Theme: Dark Mode | Glassmorphism | High Contrast
         */
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: #00f3ff; /* Cyan for high-tech feel */
            --accent-green: #00ff9d; /* Connected status */
            --accent-red: #ff4b4b; /* Error/Offline */
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --blur-strength: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 157, 0.05) 0%, transparent 20%);
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* LAYOUT STRUCTURE */
        .app-container {
            width: 95%;
            height: 90%;
            display: flex;
            gap: 20px;
            position: relative;
        }

        /* SIDEBAR (Glassmorphism) */
        .sidebar {
            width: 260px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-strength));
            -webkit-backdrop-filter: blur(var(--blur-strength));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .logo-area {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 12px;
            height: 12px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(0, 243, 255, 0.1);
            color: var(--accent-color);
            border-color: rgba(0, 243, 255, 0.2);
        }

        .system-status {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse 2s infinite;
        }

        .status-text {
            color: var(--accent-green);
        }

        /* MAIN CHAT AREA */
        .main-interface {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-strength));
            -webkit-backdrop-filter: blur(var(--blur-strength));
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .guest-id {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Scrollbar Styling */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        /* MESSAGE BUBBLES */
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.2);
            color: var(--text-primary);
            border-bottom-right-radius: 2px;
        }

        .message.system {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            border-bottom-left-radius: 2px;
        }
        
        .message.system .sender-name {
            color: var(--accent-color);
            font-size: 0.75rem;
            margin-bottom: 4px;
            display: block;
            font-weight: bold;
        }

        /* INPUT AREA */
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #user-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 14px 45px 14px 15px;
            border-radius: 10px;
            color: var(--text-primary);
            font-family: var(--font-main);
            resize: none;
            height: 50px;
            transition: border-color 0.3s;
            overflow: hidden;
        }

        #user-input:focus {
            border-color: var(--accent-color);
        }

        #send-btn, #mic-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            width: 50px;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #send-btn:hover {
            background: rgba(0, 243, 255, 0.1);
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        #mic-btn:hover {
            background: rgba(0, 255, 157, 0.1);
            color: var(--accent-green);
            border-color: var(--accent-green);
        }
        
        #mic-btn.listening {
            background: rgba(0, 255, 157, 0.2);
            color: var(--accent-green);
            border-color: var(--accent-green);
            animation: pulse 1.5s infinite;
        }

        /* SPINNER */
        .spinner-container {
            display: none;
            padding: 10px;
            align-self: flex-start;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 243, 255, 0.3);
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* TOAST NOTIFICATION */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid var(--accent-color);
            padding: 10px 20px;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 157, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 157, 0); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* SVG Icons */
        svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        /* Markdown Styles within Chat */
        .message.system code {
            background: rgba(0,0,0,0.3);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            color: #ff79c6;
        }
        
        .message.system pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid var(--glass-border);
        }
        
        .message.system pre code {
            background: transparent;
            padding: 0;
            color: #f8f8f2;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                height: 100%;
                width: 100%;
                border-radius: 0;
            }
            .sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                overflow-x: auto;
                padding: 10px;
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
            .nav-btn span {
                display: none;
            }
            .nav-btn {
                justify-content: center;
            }
            .logo-area {
                display: none;
            }
            .main-interface {
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"></div>
                VELOX AI
            </div>
            
            <button class="nav-btn active" id="btn-new-chat">
                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
                <span>New Chat</span>
            </button>
            <button class="nav-btn" id="btn-export">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
                <span>Export Data</span>
            </button>
            <button class="nav-btn" id="btn-clear">
                <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                <span>Clear Memory</span>
            </button>
            <button class="nav-btn" id="btn-settings">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span>Settings</span>
            </button>

            <div class="system-status">
                <span>System Status</span>
                <div class="status-indicator">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="status-text" id="status-text">Connected</span>
                </div>
            </div>
        </aside>

        <!-- MAIN INTERFACE -->
        <main class="main-interface">
            <header class="chat-header">
                <span class="chat-title">Active Session</span>
                <span class="guest-id" id="guest-id-display">ID: Loading...</span>
            </header>

            <div class="chat-container" id="chat-box">
                <!-- Messages will be injected here -->
                <div class="message system">
                    <span class="sender-name">Velox AI</span>
                    النظام جاهز. أمر التشغيل v3.0 مفعّل. بانتظار المدخلات التقنية.
                </div>
            </div>

            <div class="spinner-container" id="spinner">
                <div class="spinner"></div>
            </div>

            <div class="input-area">
                <button id="mic-btn" title="Voice Input">
                    <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Enter technical query..." autocomplete="off">
                </div>
                <button id="send-btn" title="Send Command">
                    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </main>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast" class="toast">Notification</div>

    <script>
        /**
         * VELOX AI v3.0 - CORE ENGINE
         * Single File Architecture
         */

        // --- CONSTANTS & CONFIG ---
        const DB_NAME = 'VeloxAIDB_v3';
        const DB_STORE = 'conversations';
        const DB_VERSION = 1;
        const SYSTEM_ID = 'Velox AI';

        // --- STATE MANAGEMENT ---
        const state = {
            guestId: '',
            isProcessing: false,
            memory: [],
            wsConnected: false // Simulated WebSocket state
        };

        // --- DOM ELEMENTS ---
        const elements = {
            chatBox: document.getElementById('chat-box'),
            input: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            micBtn: document.getElementById('mic-btn'),
            spinner: document.getElementById('spinner'),
            guestIdDisplay: document.getElementById('guest-id-display'),
            statusDot: document.getElementById('status-dot'),
            statusText: document.getElementById('status-text'),
            toast: document.getElementById('toast'),
            btnNewChat: document.getElementById('btn-new-chat'),
            btnExport: document.getElementById('btn-export'),
            btnClear: document.getElementById('btn-clear'),
            btnSettings: document.getElementById('btn-settings')
        };

        // --- INITIALIZATION ---
        (async function initSystem() {
            try {
                state.guestId = await generateGuestId();
                elements.guestIdDisplay.textContent = `ID: ${state.guestId}`;
                
                await initDB();
                await loadHistory();
                
                // Simulate WebSocket Connection
                setTimeout(() => {
                    state.wsConnected = true;
                    updateStatus('Connected');
                }, 1500);

                // Event Listeners
                elements.sendBtn.addEventListener('click', () => handleUserMessage());
                elements.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleUserMessage();
                });
                
                elements.btnNewChat.addEventListener('click', () => clearChatUI());
                elements.btnClear.addEventListener('click', clearMemory);
                elements.btnExport.addEventListener('click', exportData);
                elements.btnSettings.addEventListener('click', () => showToast("Settings Panel Locked by Admin"));
                
                elements.micBtn.addEventListener('click', toggleVoiceInput);

                console.log(`Velox AI v3.0 initialized for Guest: ${state.guestId}`);
                
                // Start Self-Healing Monitor
                startResourceMonitor();

            } catch (error) {
                console.error("System Init Failure:", error);
                updateStatus('Error');
                showToast("Critical System Failure");
            }
        })();

        // --- DATA MANAGEMENT (IndexedDB) ---
        let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains(DB_STORE)) {
                        const store = db.createObjectStore(DB_STORE, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                    }
                };
                
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                
                request.onerror = (e) => reject(e);
            });
        }

        async function saveMessage(role, text) {
            const transaction = db.transaction([DB_STORE], 'readwrite');
            const store = transaction.objectStore(DB_STORE);
            
            const record = {
                guestId: state.guestId,
                role: role, // 'user' or 'system'
                text: text,
                timestamp: Date.now()
            };
            
            store.add(record);
        }

        async function loadHistory() {
            if (!db) return;
            const transaction = db.transaction([DB_STORE], 'readonly');
            const store = transaction.objectStore(DB_STORE);
            const index = store.index('timestamp');
            const request = index.openCursor(null, 'prev'); // Get latest

            request.onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    // In a real scenario, we would limit this load. 
                    // For demo, we load the last session of this guest ID
                    if(cursor.value.guestId === state.guestId) {
                        // Logic to rebuild chat could go here. 
                        // For simplicity, we start fresh but keep history in DB.
                    }
                    cursor.continue();
                }
            };
        }

        async function clearMemory() {
            const transaction = db.transaction([DB_STORE], 'readwrite');
            const store = transaction.objectStore(DB_STORE);
            const request = store.clear();
            
            request.onsuccess = () => {
                clearChatUI();
                showToast("Memory Purged Successfully");
            };
        }

        async function exportData() {
            const transaction = db.transaction([DB_STORE], 'readonly');
            const store = transaction.objectStore(DB_STORE);
            const request = store.getAll();

            request.onsuccess = () => {
                const data = request.result;
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `velox_backup_${state.guestId}_${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast("Data Exported");
            };
        }

        // --- CORE LOGIC ENGINE ---
        async function handleUserMessage(voiceInput = null) {
            const text = voiceInput || elements.input.value.trim();
            
            // Input Validation
            if (!text) return;
            
            // Security Filter
            if (isMaliciousInput(text)) {
                appendMessage('system', "هذا الطلب خارج نطاق صلاحيات النظام التقنية");
                elements.input.value = '';
                return;
            }

            // UI Updates
            elements.input.value = '';
            elements.input.style.height = '50px'; // Reset height
            appendMessage('user', text);
            await saveMessage('user', text);

            // Processing State
            setProcessing(true);

            try {
                // Simulate "Deep Parsing" and Async Processing
                const response = await processLogicCore(text);
                appendMessage('system', response);
                await saveMessage('system', response);
            } catch (error) {
                appendMessage('system', `[SYSTEM ERROR]: ${error.message}`);
                console.error(error);
            } finally {
                setProcessing(false);
            }
        }

        function isMaliciousInput(input) {
            const forbidden = ['password', 'hack', 'secret', 'emotional', 'love', 'horoscope'];
            const lowerInput = input.toLowerCase();
            return forbidden.some(word => lowerInput.includes(word));
        }

        function processLogicCore(input) {
            return new Promise((resolve) => {
                // Simulate Network Latency & Calculation
                const delay = Math.floor(Math.random() * 800) + 400; 

                setTimeout(() => {
                    // Simple Semantic Filter for Demo Purposes
                    // In a real app, this would call an API or use a local model
                    
                    if (input.includes('code') || input.includes('function') || input.includes('html')) {
                        resolve(`**Analysis:** Request for code structure detected.\n\nHere is a standard implementation pattern:\n\n\`\`\`javascript\nfunction executeTask(order) {\n  try {\n    // Validate input parameters\n    if (!order) throw new Error("No input");\n    \n    // Execute logic\n    const result = performComplexCalculation(order);\n    return { status: "Success", data: result };\n    \n  } catch (err) {\n    logError(err);\n    return { status: "Failed", reason: err.message };\n  }\n}\n\`\`\`\n*Logic verified. No uncaught promises detected.*`);
                    } else if (input.includes('status') || input.includes('system')) {
                        resolve(`**System Report:**\n- **CPU Load:** Optimal (Simulated)\n- **Memory Heap:** Stable (Self-Healing Active)\n- **Protocol:** v3.0 Sigma-Level\n- **Uptime:** ${Math.floor(performance.now() / 1000)}s\n\nAll subsystems operational.`);
                    } else if (input.includes('who are you')) {
                        resolve("I am Velox AI, a high-performance digital tool designed for development and data analysis. My operational protocol focuses strictly on technical execution and logical inference.");
                    } else {
                        resolve("Input received and analyzed. The semantic structure suggests a general inquiry. To provide a Sigma-Level solution, please specify the technical context or provide the data set for deep parsing.");
                    }
                }, delay);
            });
        }

        // --- UI UTILITIES ---
        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            
            if (role === 'system') {
                const sender = document.createElement('span');
                sender.classList.add('sender-name');
                sender.textContent = SYSTEM_ID;
                msgDiv.appendChild(sender);
            }

            // Basic Markdown Parsing
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = parseMarkdown(text);
            msgDiv.appendChild(contentDiv);

            elements.chatBox.appendChild(msgDiv);
            elements.chatBox.scrollTop = elements.chatBox.scrollHeight;
        }

        function parseMarkdown(text) {
            let html = text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`{3}(\w*)([\s\S]*?)`{3}/g, '<pre><code class="$1">$2</code></pre>') // Code blocks
                .replace(/`([^`]+)`/g, '<code>$1</code>'); // Inline code
            return html;
        }

        function clearChatUI() {
            elements.chatBox.innerHTML = '';
            const welcomeMsg = document.createElement('div');
            welcomeMsg.classList.add('message', 'system');
            welcomeMsg.innerHTML = `<span class="sender-name">Velox AI</span><div>New session initialized. Context cleared.</div>`;
            elements.chatBox.appendChild(welcomeMsg);
        }

        function setProcessing(bool) {
            state.isProcessing = bool;
            elements.spinner.style.display = bool ? 'block' : 'none';
            elements.sendBtn.disabled = bool;
        }

        function updateStatus(status) {
            if (status === 'Connected') {
                elements.statusDot.style.backgroundColor = 'var(--accent-green)';
                elements.statusDot.style.boxShadow = '0 0 8px var(--accent-green)';
                elements.statusText.textContent = 'Connected';
                elements.statusText.style.color = 'var(--accent-green)';
            } else if (status === 'Error') {
                elements.statusDot.style.backgroundColor = 'var(--accent-red)';
                elements.statusDot.style.boxShadow = '0 0 8px var(--accent-red)';
                elements.statusText.textContent = 'Offline';
                elements.statusText.style.color = 'var(--accent-red)';
            }
        }

        function showToast(message) {
            elements.toast.textContent = message;
            elements.toast.classList.add('show');
            setTimeout(() => elements.toast.classList.remove('show'), 3000);
        }

        function generateGuestId() {
            return 'GUEST-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        }

        // --- VOICE INTEGRATION (Web Speech API) ---
        function toggleVoiceInput() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showToast("Audio Module Not Supported");
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (elements.micBtn.classList.contains('listening')) {
                // Stop logic is handled by 'end' event, but this is a manual toggle safeguard
                return; 
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; // Default to English for technical accuracy, can be changed
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                elements.micBtn.classList.add('listening');
                showToast("Listening...");
            };

            recognition.onend = () => {
                elements.micBtn.classList.remove('listening');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                elements.input.value = transcript;
                handleUserMessage(transcript);
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                elements.micBtn.classList.remove('listening');
                showToast("Audio Input Failed");
            };

            recognition.start();
        }

        // --- SELF-HEALING & MONITORING PROTOCOL ---
        function startResourceMonitor() {
            // Monitor FPS and Memory (if available)
            let lastTime = performance.now();
            let frameCount = 0;

            function monitorLoop() {
                const now = performance.now();
                frameCount++;

                if (now - lastTime >= 1000) {
                    const fps = frameCount;
                    
                    // Performance Logic: If FPS drops too low, trigger garbage collection hint or cleanup
                    if (fps < 30) {
                        console.warn("Performance degradation detected. Initiating optimization...");
                        // Force cleanup of old DOM nodes if chat is too long
                        if (elements.chatBox.childElementCount > 100) {
                            const messages = elements.chatBox.querySelectorAll('.message');
                            for(let i = 0; i < 20; i++) {
                                if(messages[i]) messages[i].remove();
                            }
                            console.log("DOM optimized.");
                        }
                    }

                    frameCount = 0;
                    lastTime = now;
                }
                requestAnimationFrame(monitorLoop);
            }
            monitorLoop();
        }

        // Auto-resize textarea
        elements.input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') this.style.height = '50px';
        });

    </script>
</body>
</html>
