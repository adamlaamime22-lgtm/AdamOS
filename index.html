<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VELOX AI</title>
    <style>
        body { margin: 0; height: 100vh; background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; overflow: hidden; }

        /* Sidebar Glass Effect */
        .sidebar { 
            width: 300px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            border-left: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; flex-direction: column; padding: 20px; 
        }

        /* Glass Logo */
        .logo-box { 
            background: rgba(0, 0, 0, 0.4); 
            padding: 15px; border-radius: 15px; 
            display: flex; align-items: center; gap: 10px; margin-bottom: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .icon-circle { width: 35px; height: 35px; background: #6f42c1; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; }

        /* Main Area */
        .main-area { flex: 1; display: flex; flex-direction: column; padding: 40px; position: relative; }
        .glass-input { 
            position: absolute; bottom: 40px; width: 80%; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 20px; border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; align-items: center; 
        }
        input { flex: 1; background: none; border: none; color: white; padding: 10px; outline: none; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-box">
        <div class="icon-circle">V</div>
        <span style="font-weight:bold; font-size: 1.2em;">VELOX</span>
    </div>
    <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;">
        محادثة جديدة +
    </div>
</div>

<div class="main-area">
    <h1 style="font-size: 3em;">مرحباً بك في VELOX</h1>
    <div class="glass-input">
        <input type="text" placeholder="اكتب سؤالك لـ VELOX...">
        <div style="background: #6f42c1; padding: 10px 20px; border-radius: 10px; cursor: pointer;">إرسال</div>
    </div>
</div>

</body>
</html>
