<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #131314; color: #e3e3e3; font-family: Roboto, sans-serif; }
        
        /* Sidebar (اليمين) */
        .sidebar { width: 260px; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .logo { font-size: 20px; font-weight: 500; padding: 10px; }
        .new-chat { background: #1e1f20; padding: 12px; border-radius: 20px; cursor: pointer; text-align: center; }

        /* Main (اليسار) */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .welcome { font-size: 32px; font-weight: 500; margin-bottom: 30px; }
        .input-box { width: 700px; background: #1e1f20; padding: 15px 25px; border-radius: 30px; display: flex; align-items: center; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
    </style>
</head>
<body>

<div class="main">
    <div class="welcome">مرحباً بك في VELOX</div>
    <div class="input-box">
        <input type="text" placeholder="اكتب سؤالك...">
    </div>
</div>

<div class="sidebar">
    <div class="logo">VELOX</div>
    <div class="new-chat">+ محادثة جديدة</div>
</div>

</body>
</html>
